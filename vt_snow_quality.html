    if (!z) return;

    if (!c) {
        el.innerHTML=`<div class="zone-placeholder"><div class="icon">⏳</div><p>Loading…</p></div>`;
        return;
    }
    if (c.error || !c.nd) {
        el.innerHTML=`<div class="zdh"><h2>${z.name}</h2>
            <div class="qbadge a-warning"><span class="emoji">⚠️</span>
            <div><div class="qname">Data unavailable</div></div></div></div>`;
        return;
    }
    if (c.nd.maxTempTomorrow == null) {
        el.innerHTML=`<div class="zdh"><h2>${z.name} <span class="tmr-tag">🌅 Tomorrow</span></h2>

            <div><div class="qname">No forecast data</div>
            <p class="qreason" style="margin-top:4px">Tomorrow's forecast unavailable. Try refreshing.</p>
            </div></div></div>`;
        return;
    }

    const nd   = c.nd;
    const tnd  = buildTomorrowNd(nd);
    const tAqs = classifyAllAspects(tnd, z);
    const {blocks} = getDayTimeline(tnd, z);
    const best = getBestFromArc(blocks);
    const overnight = getOvernightRefreeze(nd, z);

    const fahr = c => (c*9/5+32).toFixed(0);
    const inch = cm => (cm/2.54).toFixed(1);
    const LAPSE_F=1.5, ELEV_BASE=1500;
    const corrC = z.elev > ELEV_BASE ? -((z.elev-ELEV_BASE)/1000)*(LAPSE_F/1.8) : 0;
    const hiF  = fahr((tnd.maxTempToday ?? 0) + corrC);
    const loF  = fahr((tnd.minTempToday ?? 0) + corrC);

    const windMph = ((tnd.maxWind24h_kmh ?? 0) * 0.621).toFixed(0);

    const alertFor = q => ({

    const fh = h => `${h%12||12}${h>=12?'pm':'am'}`;
    const bestTime = best ? `${fh(best.startH)}–${fh(best.endH)}` : '—';

    const aspGrid = ASPECTS.map(asp => {
        const aq=tAqs[asp], isPrim=asp===z.aspect;
        return `<div class="asp-cell ${isPrim?'primary':''}" id="asp-cell-${z.id}-${asp}" style="border-left-color:${aq.color}" onclick="selectAspect('${z.id}','${asp}')">
            <span class="asp-dir">${asp}</span>
            <span class="asp-emoji">${aq.emoji}</span>
            <span class="asp-qname">${aq.quality}</span>
        </div>`;
    }).join('');

    const tmrDate = new Date(Date.now()+86400000).toLocaleDateString('en-US',
        {weekday:'long',month:'short',day:'numeric'});

    el.innerHTML=`
        <div class="zdh">
            <h2>${z.name} <span class="tmr-tag">🌅 Tomorrow</span></h2>
            <div class="zone-meta">
                <span>🏔️ ${z.elev.toLocaleString()} ft</span>
                <span>🧭 ${z.aspect}-facing</span>
                <span style="color:#FFB74D">📈 ${hiF}° / 📉 ${loF}°</span>
                <span style="padding:1px 7px;border-radius:10px;font-weight:600;letter-spacing:.03em;
                    ${z.type==='resort'
                        ? 'background:rgba(25,118,210,.18);color:#64B5F6;border:1px solid rgba(100,181,246,.3)'
                        : 'background:rgba(0,121,107,.15);color:#80CBC4;border:1px solid rgba(128,203,196,.25)'}">
                    ${z.type==='resort' ? '🏔 Resort' : '🌲 Backcountry'}</span>
            </div>
            ${best ? `<div class="qbadge a-${alertFor(best.q)}">
                <span class="emoji">${best.e}</span>
                <div>
                    <div class="qname">${best.q} <span style="font-weight:400;font-size:.78rem">(${z.aspect} · best ${bestTime})</span></div>
                    <div style="font-size:.67rem;color:var(--dim);margin-top:2px">Best expected condition for tomorrow · ${z.aspect}-facing primary aspect</div>
                </div>
            </div>` : ''}
        </div>
        <div id="dayArcBox">${renderDayArc(tnd, z, false)}</div>
        ${(() => {
            // Overnight refreeze bar: scale 0–100 degree-C·hours as 100%
            const maxCold = 100;
            const pct = Math.min(100, (overnight.degreeColdHrs / maxCold) * 100).toFixed(0);
            return `<div class="overnight-wrap">
                <div class="overnight-header">🌙 Tonight's Overnight Refreeze</div>
                <div class="overnight-card">
                    <span class="overnight-icon">${overnight.icon}</span>
                    <div class="overnight-bar-wrap">
                        <div class="overnight-bar-track">
                            <div class="overnight-bar-fill" style="width:${pct}%;background:${overnight.color}"></div>
                        </div>
                        <div class="overnight-label">${overnight.label} · ${overnight.overnightHrs.toFixed(1)}h overnight window</div>
                    </div>
                </div>
            </div>`;
        })()}
        <div class="source-tag">
            <span class="sdot" style="background:#FFB74D"></span>
            🌅 ${tmrDate} forecast — Open-Meteo 3-day model
        </div>
        <div class="rose-wrap">
            <div class="rose-title">Tomorrow's Aspect Breakdown</div>
            <div class="rose-row">
                <div class="rose-svg-wrap">${buildRoseSVG(tAqs, z.aspect, 170, z.id)}</div>
                <div class="rose-legend"><div class="asp-grid">${aspGrid}</div></div>
            </div>
        </div>
        ${z.type === 'resort' && TRAILS[z.id] ? renderTrailPicks(z.id) : ''}

            <div class="metric"><div class="mval">${loF}°</div><div class="mlbl">Forecast Low</div></div>
            <div class="metric"><div class="mval">${hiF}°</div><div class="mlbl">Forecast High</div></div>
            <div class="metric"><div class="mval">${snowI}"</div><div class="mlbl">Expected Snow</div></div>
            <div class="metric"><div class="mval">${windMph}</div><div class="mlbl">Wind mph</div></div>
        </div>

// TRAIL PICKS
// ════════════════════════════════════════════════════════════
function setTrailHour(zoneId, h) {
    activeTrailHour = h;
    renderDetail(zoneId);
    // Scroll trail picks into view smoothly
    requestAnimationFrame(() => {
        const tp = document.querySelector('.trail-picks');
        if (tp) tp.scrollIntoView({behavior:'smooth', block:'nearest'});
    });
}

function renderTrailPicks(zoneId) {
    const trails = TRAILS[zoneId];
    const c = cache[zoneId];
    if (!trails || !c?.nd) return '';

    const z    = ZONES.find(z => z.id === zoneId) || probeZones.find(p => p.id === zoneId);
    const nd   = activeTab === 'tomorrow' ? buildTomorrowNd(c.nd) : c.nd;
    const h    = activeTrailHour;
    const isNow = h === 'now';
    const hourF = isNow
        ? new Date().getHours() + new Date().getMinutes()/60
        : parseFloat(h);

    // Temperature at this hour (cosine diurnal curve)
    const LAPSE_F=1.5, ELEV_BASE=1500;
    const corrC = z.elev > ELEV_BASE ? -((z.elev-ELEV_BASE)/1000)*(LAPSE_F/1.8) : 0;
    const rawMin=nd.minTempToday??nd.minTempC_72h, rawMax=nd.maxTempToday??nd.maxTempC_72h;
    const minT=rawMin+corrC, maxT=rawMax+corrC;
    const avg=(maxT+minT)/2, amp=(maxT-minT)/2;
    const curT = avg + amp*Math.cos(2*Math.PI*(hourF-14)/24);

    // Classify every trail at this hour
    const scored = trails.map(t => {
        const vz = {...z, aspect: t.aspect};
        const r  = classifyResortAtHour(nd, vz, Math.round(hourF), curT);
        return {...t, q:r.q, c:r.c, rating: Q_RATING[r.q] ?? 3};
    }).sort((a,b) => b.rating - a.rating);

    const prime = scored.filter(t => t.rating >= 7);
    const good  = scored.filter(t => t.rating >= 4 && t.rating < 7);
    const meh   = scored.filter(t => t.rating < 4);

    const nowLabel = isNow
        ? `Now · ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`
        : `${hourF % 12 || 12}${hourF >= 12 ? 'pm' : 'am'}`;

    const row = t => `<div class="trail-row">
        <span class="trail-diff">${t.diff}</span>
        <span class="trail-name">${t.name}</span>
        <span class="trail-asp">${t.aspect}</span>
        <span class="trail-q" style="color:${t.c}">${t.q}</span>
    </div>`;

    const group = (cls, label, list) => list.length
        ? `<div class="trail-group"><div class="tg-hd ${cls}">${label}</div>${list.map(row).join('')}</div>`
        : '';

    const timeBtns = [['now','Now'],['8','8am'],['10','10am'],['12','12pm'],['14','2pm'],['16','4pm']]
        .map(([v,l]) => `<button class="tpick-btn${h===v?' active':''}" onclick="setTrailHour('${zoneId}','${v}')">${l}</button>`)
        .join('');

    return `<div class="trail-picks">
        <div class="trail-picks-hd">🎿 Trail Picks · ${nowLabel}</div>
        <div class="trail-time-btns">${timeBtns}</div>
        ${group('prime','⭐ Prime conditions', prime)}
        ${group('good', '🎿 Good',             good)}
        ${group('meh',  '⚠️ Suboptimal',        meh)}
        ${!prime.length && !good.length ? '<div class="no-picks" style="padding:6px 0">No prime conditions on any aspect right now</div>' : ''}
    </div>`;
}

// ════════════════════════════════════════════════════════════
// ZONE LIST
// ════════════════════════════════════════════════════════════
function renderList() {
    const isTmr = activeTab === 'tomorrow';
    const topHtml = isTmr ? renderTomorrowPicksBanner() : '';

    const itemsHtml = ZONES.map(z => {
        const c=cache[z.id], nd=c?.nd;
        const canopyIco = {conifer:'🌲', mixed:'🌲🍂', deciduous:'🍂', open:'🏔️'}[z.canopy ?? 'open'];
        let q, tStr, miniRose;

        if (isTmr && nd?.maxTempTomorrow != null) {
            // Tomorrow view: show tomorrow's best arc condition + Lo/Hi temps
            const tnd  = buildTomorrowNd(nd);
            const tAqs = classifyAllAspects(tnd, z);
            const {blocks} = getDayTimeline(tnd, z);
            const best = getBestFromArc(blocks);
            q = best ? {quality:best.q, color:best.c, emoji:best.e} : c?.quality;
            miniRose = buildMiniRoseSVG(tAqs);
            const LAPSE_F=1.5,ELEV_BASE=1500;
            const corrC = z.elev>ELEV_BASE ? -((z.elev-ELEV_BASE)/1000)*(LAPSE_F/1.8) : 0;
            const fahr = c => (c*9/5+32).toFixed(0);
            tStr = `${fahr((nd.minTempTomorrow??0)+corrC)}°/${fahr((nd.maxTempTomorrow??0)+corrC)}°`;
        } else {
            // Today view (or tomorrow data not yet loaded)
            q = c?.quality;
            miniRose = c?.aspectQualities
                ? buildMiniRoseSVG(c.aspectQualities)
                : `<div style="width:28px;height:28px;border-radius:50%;background:#546E7A;opacity:.4"></div>`;
            tStr = nd ? `${(nd.currentTempC*9/5+32).toFixed(0)}°F` : '—';
        }

        const qName = q?.quality || '<span style="color:var(--dim)">Loading…</span>';
        return `<div class="zitem ${activeId===z.id?'active':''}" id="li-${z.id}" onclick="selectZone('${z.id}')">
            <div class="mini-rose">${miniRose}</div>
            <div class="zi-info">
                <div class="zi-name">${z.name}</div>
                <div class="zi-sub">${qName} · ${z.elev.toLocaleString()}ft ${canopyIco}</div>
            </div>
            <div class="zi-temp" style="${isTmr?'font-size:.72rem;color:#FFB74D':''}">` +
            `${tStr}</div>
        </div>`;
    }).join('');

    document.getElementById('zoneListItems').innerHTML = topHtml + itemsHtml;
    // Update mobile zone cards too
    if (typeof renderZoneCards === 'function') renderZoneCards();
}

// ════════════════════════════════════════════════════════════
// LOAD ALL ZONES
// ════════════════════════════════════════════════════════════
async function loadAllZones(forceRefresh=false) {
    const CACHE_SUFFIX = '_om15';
    const setStatus = msg => { document.getElementById('lastUpdated').textContent = msg; };

    if (forceRefresh) {
        ZONES.forEach(z => localStorage.removeItem('wx_' + z.id + CACHE_SUFFIX));
    }

    // ── Phase 1: Serve cached data immediately ────────────────
    let needsFetch = false;
    ZONES.forEach(z => {
        const nd = wxCacheGet(z.id + CACHE_SUFFIX);
        if (nd) {
            cache[z.id] = {nd, quality: classify(nd, z), aspectQualities: classifyAllAspects(nd, z)};
            updateWedges(z.id); refreshMarker(z.id);
        } else {
            needsFetch = true;
        }
    });
    if (Object.keys(cache).length) { renderList(); if (activeId && cache[activeId]) renderDetail(activeId); }
    if (!needsFetch) {
        const t = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
        setStatus(`Updated ${t}`);
        return;
    }

    // ── Phase 2: Fetch ALL data sources in parallel ───────────
    // Compute date ranges first so all three fetches fire simultaneously —
    // no sequential round trips on mobile.
    setStatus('Loading…');
    try {
        const now = new Date();
        const seasonStart = new Date(now.getMonth() < 7 ? now.getFullYear()-1 : now.getFullYear(), 9, 15);
        const windowStart = new Date(now); windowStart.setDate(windowStart.getDate() - FORECAST_DAYS);

        const fetches = [
            fetchAllZonesBatch(),
            fetchHourlyBatch().catch(() => null),
        ];
        if (seasonStart < windowStart) {
            const s = seasonStart.toISOString().slice(0,10);
            const e = new Date(windowStart - 86400000).toISOString().slice(0,10);
            fetches.push(fetchArchiveBatch(s, e).catch(() => null));
        }
        const [rawBatch, hourlyBatch, archiveBatch = null] = await Promise.all(fetches);

        rawBatch.forEach((raw, i) => {
            const z = ZONES[i]; if (!z) return;
            raw._archiveSnowCm = archiveBatch?.[i]?.daily?.snowfall_sum
                ? archiveBatch[i].daily.snowfall_sum.reduce((a,v)=>a+(v??0),0)
                : 0;
            try {
                const nd = normalizeOpenMeteo(raw, hourlyBatch?.[i] ?? null);
                wxCacheSet(z.id + CACHE_SUFFIX, nd);
                cache[z.id] = {nd, quality: classify(nd, z), aspectQualities: classifyAllAspects(nd, z)};
                updateWedges(z.id); refreshMarker(z.id);
            } catch(err) {
                console.warn(`[${z.name}]`, err.message);
                if (!cache[z.id]) cache[z.id] = {nd:null, quality:null, aspectQualities:null, error:err.message};
            }
        });

        renderList();
        if (activeId) renderDetail(activeId);
    } catch(err) {
        console.warn('Batch fetch failed, falling back to per-zone:', err.message);
        await loadZonesFallback(CACHE_SUFFIX, setStatus);
        return;
    }

    const t = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    setStatus(`Updated ${t}`);
}

// Fallback: individual per-zone fetches used when batch API fails
async function loadZonesFallback(cacheSuffix, setStatus) {
    let done = 0;
    await Promise.all(ZONES.map(async z => {
        if (cache[z.id]?.nd) { done++; return; } // already loaded from Phase 1
        try {
            const om = await fetchOpenMeteo(z.lat, z.lon);
            const nd = normalizeOpenMeteo(om);
            wxCacheSet(z.id + cacheSuffix, nd);
            cache[z.id] = {nd, quality: classify(nd, z), aspectQualities: classifyAllAspects(nd, z)};
            updateWedges(z.id); refreshMarker(z.id);
        } catch(err) {
            console.warn(`[${z.name}]`, err.message);
            if (!cache[z.id]) cache[z.id] = {nd:null, quality:null, aspectQualities:null, error:err.message};
        }
        done++;
        setStatus(`Loading ${done} / ${ZONES.length}…`);
    }));
    renderList();
    if (activeId) renderDetail(activeId);
    const t = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    setStatus(`Updated ${t}`);
}

// ════════════════════════════════════════════════════════════
// TIME SLIDER + SUN TRACKING
// ════════════════════════════════════════════════════════════
function formatHour(h) {
    const hr = Math.floor(h), min = Math.round((h % 1) * 60);
    const ampm = hr >= 12 ? 'pm' : 'am';
    const h12 = hr % 12 || 12;
    return min ? `${h12}:${min < 10 ? '0' + min : min}${ampm}` : `${h12}${ampm}`;
}

let _sliderRAF = null;
function onTimeSlider(h) {
    timeOverride = h;
    const label = document.getElementById('tcTimeLabel');
    if (label) label.textContent = formatHour(h);
    const nowBtn = document.getElementById('tcNowBtn');
    if (nowBtn) nowBtn.style.opacity = '1';

    // Throttle heavy GeoJSON rebuild to one per animation frame
    if (_sliderRAF) cancelAnimationFrame(_sliderRAF);
    _sliderRAF = requestAnimationFrame(() => {
        _sliderRAF = null;
        try {
            if (map && map.getSource('wedges')) {
                map.getSource('wedges').setData(buildWedgeGeoJSON(h));
            }
        } catch(e) { console.warn('Slider wedge rebuild error:', e.message); }
        try { recolorMarkersAtHour(h); } catch(e) {}
        try { updateSunPosition(h); } catch(e) {}
        try { updateSunInfo(h); } catch(e) {}
    });
}

function resetTimeToNow() {
    timeOverride = null;
    const nowH = new Date().getHours() + new Date().getMinutes() / 60;
    const clampH = Math.max(7, Math.min(17, nowH));
    const slider = document.getElementById('tcSlider');
    if (slider) slider.value = clampH;
    const label = document.getElementById('tcTimeLabel');
    if (label) label.textContent = formatHour(clampH);
    const nowBtn = document.getElementById('tcNowBtn');
    if (nowBtn) nowBtn.style.opacity = '.5';

    // Restore original cached wedge colors
    if (map && map.getSource('wedges')) {
        map.getSource('wedges').setData(buildWedgeGeoJSON(null));
    }
    // Restore marker colors
    Object.keys(cache).forEach(id => {
        const color = cache[id]?.quality?.color ?? '#546E7A';
        if (markerEls[id]) markerEls[id].style.background = color;
    });
    updateSunPosition(clampH);
    updateSunInfo(clampH);
}

// Update marker dot colors at a specific hour
function recolorMarkersAtHour(h) {
    const LAPSE_F = 1.5, ELEV_BASE = 1500;
    Object.keys(cache).forEach(id => {
        const c = cache[id];
        if (!c?.nd || !markerEls[id]) return;
        const z = ZONES.find(z => z.id === id) || probeZones.find(p => p.id === id);
        if (!z) return;
        const nd = c.nd;
        const elevCorrC = (z.elev ?? 0) > ELEV_BASE ? -(((z.elev ?? 0) - ELEV_BASE) / 1000) * (LAPSE_F / 1.8) : 0;
        const rawMin = nd.minTempToday ?? nd.minTempC_72h;
        const rawMax = nd.maxTempToday ?? nd.maxTempC_72h;
        if (rawMin == null || rawMax == null) return;
        const minT = rawMin + elevCorrC, maxT = rawMax + elevCorrC;
        const avg = (maxT + minT) / 2, amp = (maxT - minT) / 2;
        const curT = avg + amp * Math.cos(2 * Math.PI * (h - 14) / 24);
        const classifyFn = z.type === 'resort' ? classifyResortAtHour : classifyBCAtHour;
        try {
            const cond = classifyFn(nd, z, h, curT);
            if (cond) markerEls[id].style.background = cond.c ?? '#546E7A';
        } catch(e) {}
    });
}

// Sun position — updates sun ray GeoJSON + HTML marker
function updateSunPosition(h) {
    if (!window._suncalcReady || typeof SunCalc === 'undefined' || !map) return;

    const now = new Date();
    const date = new Date(now.getFullYear(), now.getMonth(), now.getDate(), Math.floor(h), Math.round((h % 1) * 60));
    const pos = SunCalc.getPosition(date, VT_CENTER_LAT, VT_CENTER_LON);

    // If sun below horizon, clear the ray
    if (pos.altitude < 0) {
        if (map.getSource('sun-ray')) {
            map.getSource('sun-ray').setData({ type: 'FeatureCollection', features: [] });
        }
        if (sunMarker) { sunMarker.remove(); sunMarker = null; }
        return;
    }

    const bearing = (pos.azimuth * 180 / Math.PI + 180) % 360;
    const altDeg = pos.altitude * 180 / Math.PI;
    const dist = 4000 + (90 - altDeg) * 80;
    const sunPt = offsetLatLon(VT_CENTER_LAT, VT_CENTER_LON, dist, bearing);

    // Update ray line GeoJSON
    if (map.getSource('sun-ray')) {
        map.getSource('sun-ray').setData({
            type: 'Feature',
            geometry: {
                type: 'LineString',
                coordinates: [[VT_CENTER_LON, VT_CENTER_LAT], [sunPt[1], sunPt[0]]]
            }
        });
    }

    // Sun emoji marker (HTML)
    const glow = altDeg > 25 ? 'drop-shadow(0 0 8px gold)' : 'drop-shadow(0 0 4px #fb8c00)';
    if (sunMarker) {
        sunMarker.setLngLat([sunPt[1], sunPt[0]]);
    } else {
        const el = document.createElement('div');
        el.className = 'tc-sun-icon';
        el.style.cssText = `font-size:24px;filter:${glow};text-align:center;pointer-events:none`;
        el.textContent = '☀️';
        sunMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
            .setLngLat([sunPt[1], sunPt[0]])
            .addTo(map);
    }
}

function updateSunInfo(h) {
    const el = document.getElementById('tcSunInfo');
    if (!el) return;
    if (!window._suncalcReady || typeof SunCalc === 'undefined') {
        el.textContent = '';
        return;
    }
    const now = new Date();
    const date = new Date(now.getFullYear(), now.getMonth(), now.getDate(), Math.floor(h), Math.round((h % 1) * 60));
    const pos = SunCalc.getPosition(date, VT_CENTER_LAT, VT_CENTER_LON);
    const altDeg = (pos.altitude * 180 / Math.PI).toFixed(0);
    const azDeg = ((pos.azimuth * 180 / Math.PI + 180) % 360).toFixed(0);
    // Cardinal direction from azimuth
    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
    const dir = dirs[Math.round(azDeg / 45) % 8];
    if (pos.altitude < 0) {
        el.innerHTML = '<span class="tc-sun-icon">🌙</span> Below horizon';
    } else {
        el.innerHTML = `<span class="tc-sun-icon">☀️</span> ${altDeg}° altitude · ${dir} (${azDeg}°)`;
    }
}

// ════════════════════════════════════════════════════════════
// MOBILE BOTTOM SHEET + ZONE CARDS + LEGEND TOGGLE
// ════════════════════════════════════════════════════════════

// Sheet states: peek (just cards visible), half (cards + list), full (scrollable detail)
const SHEET_PEEK = 120; // px from bottom
const SHEET_HALF_VH = 50;
const SHEET_FULL_VH = 85;
let sheetState = 'peek'; // 'peek' | 'half' | 'full'

function isMobile() { return window.innerWidth <= 768; }

function getSheetTranslateY(state) {
    const sheet = document.getElementById('sidebarSheet');
    if (!sheet) return 0;
    const h = sheet.offsetHeight || window.innerHeight * 0.85;
    switch (state) {
        case 'peek': return h - SHEET_PEEK;
        case 'half': return h - (window.innerHeight * SHEET_HALF_VH / 100);
        case 'full': return h - (window.innerHeight * SHEET_FULL_VH / 100);
        default: return h - SHEET_PEEK;
    }
}

function setSheetState(state) {
    sheetState = state;
    const sheet = document.getElementById('sidebarSheet');
    if (!sheet) return;
    const ty = getSheetTranslateY(state);
    sheet.style.transform = `translateY(${ty}px)`;
    // Adjust time control position above the visible sheet portion
    const tc = document.getElementById('timeControl');
    if (tc && isMobile()) {
        const visibleH = sheet.offsetHeight - ty;
        tc.style.bottom = visibleH + 'px';
    }
}

function initBottomSheet() {
    if (!isMobile()) return;
    const handle = document.getElementById('sheetHandle');
    const sheet = document.getElementById('sidebarSheet');
    if (!handle || !sheet) return;

    // Set initial peek state
    setSheetState('peek');

    let startY = 0, startTranslateY = 0, isDragging = false;

    function getCurrentTranslateY() {
        const st = sheet.style.transform;
        const m = st.match(/translateY\(([^)]+)px\)/);
        return m ? parseFloat(m[1]) : 0;
    }

    handle.addEventListener('touchstart', (e) => {
        isDragging = true;
        startY = e.touches[0].clientY;
        startTranslateY = getCurrentTranslateY();
        sheet.style.transition = 'none';
    }, { passive: true });

    handle.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const dy = e.touches[0].clientY - startY;
        const newY = Math.max(0, startTranslateY + dy);
        sheet.style.transform = `translateY(${newY}px)`;
    }, { passive: true });

    handle.addEventListener('touchend', (e) => {
        if (!isDragging) return;
        isDragging = false;
        sheet.style.transition = 'transform .3s cubic-bezier(.25,.8,.25,1)';
        const currentY = getCurrentTranslateY();
        const sheetH = sheet.offsetHeight || window.innerHeight * 0.85;
        const visibleFraction = (sheetH - currentY) / sheetH;

        // Snap to nearest state
        if (visibleFraction < 0.25) {
            setSheetState('peek');
        } else if (visibleFraction < 0.6) {
            setSheetState('half');
        } else {
            setSheetState('full');
        }
    }, { passive: true });

    // Also allow tap on handle to cycle states
    handle.addEventListener('click', () => {
        sheet.style.transition = 'transform .3s cubic-bezier(.25,.8,.25,1)';
        if (sheetState === 'peek') setSheetState('half');
        else if (sheetState === 'half') setSheetState('full');
        else setSheetState('peek');
    });
}

// ── Zone Cards Strip ──
function renderZoneCards() {
    if (!isMobile()) return;
    const strip = document.getElementById('zoneCardsStrip');
    if (!strip) return;

    const html = ZONES.map(z => {
        const c = cache[z.id];
        const nd = c?.nd;
        const q = c?.quality;
        const color = q?.color || '#546E7A';
        const label = q?.quality || 'Loading';
        let temp = '—';
        if (nd?.currentTempC != null) {
            temp = (nd.currentTempC * 9/5 + 32).toFixed(0) + '°';
        }
        const isActive = activeId === z.id;
        return `<div class="zone-card ${isActive ? 'active' : ''}" onclick="selectZone('${z.id}')">
            <div class="zone-card-name">${z.name}</div>
            <div class="zone-card-cond">
                <div class="zone-card-dot" style="background:${color}"></div>
                <span class="zone-card-q">${label}</span>
                <span class="zone-card-temp">${temp}</span>
            </div>
        </div>`;
    }).join('');

    strip.innerHTML = html;

    // Scroll active card into view
    if (activeId) {
        const activeCard = strip.querySelector('.zone-card.active');
        if (activeCard) {
            activeCard.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
        }
    }
}

// ── Legend Toggle ──
function toggleMobileLegend() {
    const legend = document.getElementById('mapLegend');
    const btn = document.getElementById('legendToggle');
    if (!legend || !btn) return;
    legend.classList.toggle('leg-open');
    btn.classList.toggle('active');
}

// ── Touch-friendly view hint ──
function updateViewHint() {
    const hint = document.getElementById('viewHint');
    if (!hint) return;
    if (isMobile()) {
        hint.textContent = 'Two-finger drag to tilt · Pinch to zoom';
    } else {
        hint.textContent = 'Right-click + drag to tilt · Scroll to zoom';
    }
}

// ════════════════════════════════════════════════════════════
// MOBILE DETAIL OVERLAY
// ════════════════════════════════════════════════════════════
function openMobileDetail(zoneName) {
    if (!isMobile()) return;
    const sidebar = document.getElementById('sidebarSheet');
    if (sidebar) sidebar.classList.add('mobile-detail-open');
    const label = document.getElementById('mobileBackLabel');
    if (label) label.textContent = zoneName || '';
    const zd = document.getElementById('zoneDetail');
    if (zd) zd.scrollTop = 0;
    // Expand sheet to full to show detail
    const sheet = document.getElementById('sidebarSheet');
    if (sheet) sheet.style.transition = 'transform .3s cubic-bezier(.25,.8,.25,1)';
    setSheetState('full');
    renderZoneCards();
}

function closeMobileDetail() {
    const sidebar = document.getElementById('sidebarSheet');
    if (sidebar) sidebar.classList.remove('mobile-detail-open');
    // Deselect active zone so markers reset
    if (activeId) {
        const prev = activeId; activeId = null;
        refreshMarker(prev); updateWedges(prev);
        document.querySelectorAll('.zitem').forEach(e => e.classList.remove('active'));
    }
    const zd = document.getElementById('zoneDetail');
    if (zd) zd.innerHTML = `
        <div class="zone-placeholder">
            <div class="icon">🗺️</div>
            <p>Tap a zone to see the full 8-aspect snow quality breakdown.</p>
        </div>`;
    // Collapse sheet back to half
    const sheet = document.getElementById('sidebarSheet');
    if (sheet) sheet.style.transition = 'transform .3s cubic-bezier(.25,.8,.25,1)';
    setSheetState('half');
    renderZoneCards();
}

// ════════════════════════════════════════════════════════════
// BOOT — weather and map load independently
// ════════════════════════════════════════════════════════════
// _tryInitMap is called by whichever arrives last: DOM ready OR Leaflet async load.
// If Leaflet is fast it may fire before DOMContentLoaded; if slow, DOMContentLoaded
// fires first and the weather list/API calls start immediately without waiting for the map.
window._tryInitMap = function() {
    if (!window._mapLibReady || !window._domReady || window._mapInited) return;
    window._mapInited = true;
    try {
        initMap();
        // Initialize sun position once map loads
        if (map) map.on('load', () => {
            const nowH = Math.max(7, Math.min(17, new Date().getHours() + new Date().getMinutes() / 60));
            updateSunPosition(nowH);
        });
    } catch(e) { console.warn('Map init failed:', e.message); }
};

document.addEventListener('DOMContentLoaded', () => {
    // Start weather immediately — no waiting for Leaflet
    renderList();
    loadAllZones();

    // Mobile setup
    initBottomSheet();
    updateViewHint();
    renderZoneCards();

    // Signal DOM is ready, then attempt map init
    window._domReady = true;
    _tryInitMap();
});

// Resize MapLibre on orientation change / window resize
window.addEventListener('resize', () => {
    if (map) map.resize();
    updateViewHint();
    // Re-init sheet state on orientation change
    if (isMobile()) {
        setSheetState(sheetState);
    }
});
</script>
