// ════════════════════════════════════════════════════════════
function classify(nd, zone) {
    if (zone?.type === 'resort') return classifyResort(nd, zone);
    const {currentTempC:rawCurT,maxTempC_72h:rawMaxT,minTempC_72h:rawMinT,
           snow24h_cm:s24,snow72h_cm:s72,snow7d_cm:s7,
           rain24h_mm:r24,rain72h_mm:r72,
           maxWind24h_kmh:wind,snowDepthM:depthM,
           snowfall_season_cm:seasonSnow=0} = nd;

    // ── Elevation lapse rate correction ───────────────────
    // Open-Meteo grid cells are terrain-averaged; summits are consistently colder.
    // Actual VT lapse rate ~3°F/1000ft, but the HRRR model (3km grid) already
    // captures much of the terrain elevation, so we apply only a modest offset.
    // 1.5°F/1000ft above 1500ft baseline avoids over-cooling mid-elevation zones
    // (Bromley SE 3284ft: -1.5°C  |  Stratton 3940ft: -2.0°C  |  Haystack 3420ft: -1.6°C)
    const LAPSE_F = 1.5, ELEV_BASE = 1500;
    const elevCorrC = (zone.elev ?? 0) > ELEV_BASE
        ? -((zone.elev - ELEV_BASE) / 1000) * (LAPSE_F / 1.8)
        : 0;
    const curT = rawCurT + elevCorrC;
    const maxT = rawMaxT + elevCorrC;
    const minT = rawMinT + elevCorrC;

    const fahr = c => (c*9/5+32).toFixed(0);
    const inch  = cm => (cm/2.54).toFixed(1);
    const depIn = (depthM*39.37).toFixed(0);

    const month = new Date().getMonth();   // 0=Jan … 11=Dec
    const hour  = new Date().getHours();

    // Corn season: S/SE/SW/E eligible from Feb; all aspects Mar–May
    const isCornSeason = month >= 2 && month <= 4;

    // ── Solar calculation ─────────────────────────────────
    // Insolation map: S = full midday sun; N = almost none
    const solarMap = {N:.05, NE:.20, NW:.12, E:.55, W:.45, SE:.80, SW:.72, S:.95};
    // Feb: slight boost as sun angle rises; Mar–May: 1.5× for corn eligibility
    const springMult = isCornSeason ? 1.5 : (month === 1 ? 1.15 : 1.0);

    // Canopy shade — how much of that solar actually hits the snow
    // VT phenology: deciduous leaf-out ~May 1, leaf-off ~Oct 15
    const isWinter = month <= 1 || month >= 10;  // Nov–Feb = bare deciduous
    const canopyMult = ({
        conifer:   0.45,                    // spruce-fir blocks ~55% year-round
        mixed:     isWinter ? 0.65 : 0.50, // hardwoods bare in winter
        deciduous: isWinter ? 0.85 : 0.45, // nearly bare in winter → ~15% block
        open:      1.0                      // no cover
    })[zone.canopy ?? 'open'];

    // rawSolar: aspect direction relative to sun, no canopy — used for solarSoftening direction check
    // solar: full canopy-adjusted heating that reaches the snowpack — used for corn/crust thresholds
    const rawSolar = (solarMap[zone.aspect] ?? 0.5) * springMult;
    const solar    = rawSolar * canopyMult;

    // ── Base condition helpers ────────────────────────────
    // Three independent signals — any one is sufficient:
    //  ① Model snow depth > 6"  (direct but often under-estimates)
    //  ② Recent snowfall (past 7d > 6")  (fresh storm base)
    //  ③ Strong seasonal accumulation (> 40cm since Oct 1) AND not a warm/rainy meltout
    //     Guard: if it's been >5°C AND raining for 72h, the season base is likely gone
    const warmRainyMeltout = maxT > 5 && r72 > 15;  // prolonged warm+rain wipes a base
    function hasBaseCheck() {
        return depthM > 0.15
            || s7 > 15
            || (seasonSnow > 40 && !warmRainyMeltout);
    }
    const hasBase = hasBaseCheck();

    // ── Key flags ─────────────────────────────────────────
    // Rain refreeze → hard ice
    const rainThenFreeze  = r72 > 3 && curT < -2;
    // Freeze-thaw cycle (research: melt > 1°C day, refreeze < -4°C night)
    const freezeThaw      = maxT > 1 && minT < -4;
    // Solar surface softening: happens even when air temp is slightly below 0°C
    // Key real-world fix: SE aspects sticky at -1°C while NE stays good
    // Use rawSolar (pre-canopy) for direction check: canopy reduces intensity but
    // doesn't change which way a slope faces. Threshold 0.55 = E/SE/S/SW/W aspects.
    // This prevents conifer zones from showing identical quality on all 8 aspects —
    // even in dense spruce-fir, a S-facing slope gets more solar than a N-facing one.
    // Threshold -4°C (25°F): Feb sunshine on SE/S slopes actively softens snow even
    // at these temps. Using -3 was too tight — after lapse-rate correction a 29°F
    // model reading maps to -3.1°C, just barely blocking solarSoftening and falsely
    // triggering Powder on sun-exposed aspects.
    // Precise corn melt-freeze: 20s°F nights, 30–40°F days (defined early to gate solarSoftening)
    const cornCycle       = maxT >= 0 && maxT <= 5 && minT >= -9 && minT <= -3;
    const cornAspects     = ['S','SE','SW','E'];
    const cornEligible    = isCornSeason || (month === 1 && cornAspects.includes(zone.aspect));
    // On a proper corn day, suppress solarSoftening so Corn Snow fires instead of Wet/Heavy.
    // Without this, any S/SE/SW/E aspect with curT > -4°C routes to Wet/Heavy at ②,
    // never reaching Corn Snow at ⑥ — even on a perfect freeze-thaw day with no fresh snow.
    const isCornDay       = cornEligible && cornCycle && solar > 0.45 && hasBase && s24 < 5;
    const solarSoftening  = rawSolar > 0.55 && curT > -4 && hasBase
                            && !(isCornDay && hour < 15 && curT <= 1);
    // Active melt from above-freezing air
    const activeMelt      = curT > 1 && hasBase;
    // Active rain on snowpack
    const rainOnSnow      = r24 > 5 && hasBase;
    // Wind-slab conditions
    // 40 km/h (25 mph) = genuine snow-transport wind; 8cm (3") = enough fresh snow to load slabs.
    // Previously 25 km/h / 3cm fired constantly on open summits (every breezy day with any snow).
    const windSlab        = wind > 40 && s72 > 8;

    // ── CLASSIFICATION — priority order ──────────────────

    // ① CRUSTY / ICE
    // Rain refroze (hard ice) OR classic freeze-thaw with no fresh snow buffer.
    // On corn days: crust only persists until ~10am (surface then warms to corn texture).
    // On non-corn days: crust persists all day until solarSoftening takes over.
    const crustyOk = isCornDay ? hour < 10 : !solarSoftening;
    if((rainThenFreeze && s24 < 3) ||
       (s24 < 8 && freezeThaw && solar > 0.25 && crustyOk))
        return {quality:'Crusty/Ice', rating:1, color:'#78909C', emoji:'🧊', alert:'danger',
            reason: rainThenFreeze
                ? `${r72.toFixed(1)}mm rain refroze at ${fahr(curT)}°F. Hard icy surface.`
                : `Melt-refreeze cycle (H:${fahr(maxT)}°F / L:${fahr(minT)}°F) on ${zone.aspect}-facing slope. Breakable crust over soft snow.`};

    // ② WET / HEAVY
    // Above-freezing air, OR rain on snow, OR solar cooking the surface
    // This is what makes SE aspects sticky even when air temp is ~27-29°F
    if(activeMelt || rainOnSnow || solarSoftening)
        return {quality:'Wet/Heavy', rating:3, color:'#C62828', emoji:'💦', alert:'warning',
            reason: activeMelt
                ? `${fahr(curT)}°F — snow above freezing and saturating.`
                : solarSoftening
                    ? `Solar heating on ${zone.aspect} face softening surface (${fahr(curT)}°F air). Expect sticky, grabby conditions.`
                    : `${r24.toFixed(1)}mm rain soaking the snowpack. Wet slab risk.`};

    // ③ WIND SLAB
    // 40+ km/h (25+ mph) sustained transport winds + 3"+ recent snow loads leeward slabs
    if(windSlab)
        return {quality:'Wind Slab', rating:4, color:'#FB8C00', emoji:'💨', alert:'warning',
            reason:`Winds to ${wind.toFixed(0)} km/h (${(wind*0.621).toFixed(0)} mph) with ${inch(s72)}" recent snow. Dense slab on leeward aspects.`};

    // ④ BLOWER POWDER
    // Ultra-cold snowfall < -8°C produces stellar dendrites at ~15:1 snow-to-liquid ratio
    if(s24 > 10 && curT < -8 && r72 < 0.5)
        return {quality:'Blower Powder', rating:10, color:'#64B5F6', emoji:'❄️', alert:'excellent',
            reason:`${inch(s24)}" in 24h at ${fahr(curT)}°F — ultra-light ~15:1 snow-to-liquid ratio. Exceptional conditions.`};

    // ⑤ POWDER
    // Normal cold snowfall (-3 to -8°C), ~10:1 snow-to-liquid, still dry and rideable
    if((s24 > 8 || s72 > 20) && curT < -3 && r72 < 1 && maxT < 0)
        return {quality:'Powder', rating:9, color:'#1565C0', emoji:'🎿', alert:'excellent',
            reason:`${inch(s72)}" in 72h at ${fahr(curT)}°F. Cold temps maintaining ~10:1 snow-to-liquid ratio.`};

    // ⑥ CORN SNOW
    // Precise melt-freeze window: 20s°F nights refreeze, 30s–40s°F days soften top 2-3"
    // Best window 10am–2pm; SE/S/SW/E eligible from Feb, all aspects from March
    if(cornEligible && cornCycle && solar > 0.45 && hasBase && s24 < 5) {
        const window = hour < 10 ? 'Still firm — wait until late morning.' :
                       hour < 14 ? '🎯 Prime corn window (11am–1pm)!' :
                                   'Softening past prime — may be getting wet.';
        return {quality:'Corn Snow', rating:8, color:'#F9A825', emoji:'🌽', alert:'good',
            reason:`Melt-freeze cycle on ${zone.aspect}-facing (H:${fahr(maxT)}°F / L:${fahr(minT)}°F). ${window}`};
    }

    // ⑦ SETTLED POWDER
    // A few days old but still great — equi-temp metamorphism rounds grains
    // without degrading quality; cold enough to stay dry and grippy.
    // Two paths to qualify:
    //   A) Recent snow in the past week (s7 > 4cm ~1.5") — classic recent storm base
    //   B) Strong seasonal accumulation (> 50cm since Oct 1) + cold + no meltout
    //      This catches the "it hasn't snowed in a week but Magic Mountain still has
    //      a solid 2-foot base" scenario that was falsely calling Variable/Thin.
    const seasonalBase = seasonSnow > 50 && !warmRainyMeltout;
    if((s7 > 4 || seasonalBase) && curT < 0 && r72 < 3) {
        const baseDesc = s7 > 4
            ? `${inch(s7)}" in the past week`
            : `${inch(seasonSnow)}" seasonal accumulation`;
        return {quality:'Settled Powder', rating:7, color:'#00897B', emoji:'🌨️', alert:'good',
            reason:`${baseDesc}. Grain-bonded settled snow — firm, consistent, great to ride. ${fahr(curT)}°F keeping it dry.`};
    }

    // FALLBACK — old/thin snowpack
    const seasonStr = seasonSnow > 5 ? ` (${inch(seasonSnow)}" seasonal total)` : '';
    return {quality:'Variable/Thin', rating:0, color:'#37474F', emoji:'❓', alert:'unknown',
        reason:`${hasBase ? `~${depIn}" estimated base${seasonStr}, variable surfaces.` : `Very thin or undetectable snowpack${seasonStr}.`} Check recent reports.`};
}

// Run classify for all 8 compass aspects using the same weather data
// Passes zone's canopy AND elev so solar shading + lapse rate apply correctly
function classifyAllAspects(nd, zone) {
    const res={};
    ASPECTS.forEach(asp => res[asp] = classify(nd, {
        aspect: asp,
        canopy: zone?.canopy ?? 'open',
        elev:   zone?.elev   ?? 0       // needed for lapse rate correction
    }));
    return res;
}

// ════════════════════════════════════════════════════════════
// OPTIMAL TIME OF DAY
//
// Models the diurnal temperature curve (min ~6am, peak ~2pm) and
// cross-references it with aspect-specific solar windows to tell
// the rider the best time to hit a given slope.
//
// Solar windows are calibrated for VT latitude (~43°N):
//   E-facing:  sun starts ~7:30am, peaks ~10am, done by noon
//   SE-facing: sun starts ~8am,    peaks ~11am, done by 1pm
//   S-facing:  sun starts ~9am,    peaks ~12:30pm, done by 4pm
//   SW-facing: sun starts ~11am,   peaks ~2pm, done by 5pm
//   W-facing:  sun starts ~1pm,    peaks ~3:30pm, done by 6pm
//   N/NE/NW:   minimal direct solar all day
// ════════════════════════════════════════════════════════════
function getOptimalWindow(nd, zone) {
    const asp    = zone.aspect;
    const month  = new Date().getMonth();
    const nowH   = new Date().getHours();
    const q      = classify(nd, zone).quality;

    // Format decimal hour → "9am", "11:30am", "2pm" etc.
    const fmt = h => {
        const hh = Math.floor(h), mm = Math.round((h % 1) * 60);
        const p  = hh >= 12 ? 'pm' : 'am';
        const d  = hh > 12 ? hh - 12 : (hh === 0 ? 12 : hh);
        return mm >= 5 ? `${d}:${String(mm).padStart(2,'0')}${p}` : `${d}${p}`;
    };
    const fahr = c => Math.round(c * 9/5 + 32);

    // ── Elevation lapse rate (same logic as classify) ────────
    const LAPSE_F_OW = 1.5, ELEV_BASE_OW = 1500;
    const elevCorrC_OW = (zone.elev ?? 0) > ELEV_BASE_OW
        ? -((zone.elev - ELEV_BASE_OW) / 1000) * (LAPSE_F_OW / 1.8)
        : 0;

    // ── Diurnal temperature model ─────────────────────────
    // Min ~6am, max ~2pm — cosine curve fit; apply elevation correction
    const minT = (nd.minTempToday ?? nd.minTempC_72h) + elevCorrC_OW;
    const maxT = (nd.maxTempToday ?? nd.maxTempC_72h) + elevCorrC_OW;
    const avg  = (maxT + minT) / 2;
    const amp  = (maxT - minT) / 2;
    // T(h) = avg + amp * cos(2π(h-14)/24)  →  max at h=14 (2pm), min at h=2 (2am)
    // Approximation: real VT min is ~6am but 2am is close enough for our 7am-5pm window
    const tempAt = h => avg + amp * Math.cos(2 * Math.PI * (h - 14) / 24);

    // ── Aspect solar windows (VT ~43°N, winter/spring) ───
    // [start, peak, end] in decimal hours
    const SOLAR = {
        N:   null,
        NE:  [7.5,  9.5,  11.5],
        E:   [7.0,  10.0, 12.5],
        SE:  [8.0,  11.0, 13.5],
        S:   [9.0,  12.5, 16.0],
        SW:  [10.5, 14.0, 17.5],
        W:   [12.5, 15.5, 18.0],
        NW:  [14.0, 16.5, 18.5]
    };

    // Corn windows: the sub-window within solar where surface is in the sweet spot
    // (top 1-2" softened, base still firm)
    const CORN = {
        E:   [8.5,  11.0],
        SE:  [9.5,  12.0],
        S:   [10.5, 13.5],
        SW:  [11.5, 14.5],
        W:   [13.0, 16.0]
    };

    // Canopy + aspect solar (same logic as classify)
    const isWinter   = month <= 1 || month >= 10;
    const canopyMult = ({conifer:.45, mixed:isWinter?.65:.50, deciduous:isWinter?.85:.45, open:1.0})[zone.canopy??'open'];
    const springMult = (month>=2&&month<=4) ? 1.5 : (month===1 ? 1.15 : 1.0);
    const baseSolar  = (({N:.05,NE:.20,NW:.12,E:.55,W:.45,SE:.80,SW:.72,S:.95})[asp]??0.5) * springMult * canopyMult;
    const isHighSolar = baseSolar > 0.50;

    // When does solar softening start today? (tempAt > -3 on a high-solar aspect)
    let softenHour = null;
    if (isHighSolar) {
        for (let h = 7; h <= 17; h++) {
            if (tempAt(h) > -3) { softenHour = h; break; }
        }
    }

    const isPast    = h => nowH >= h;
    const tomorrowMin = nd.minTempTomorrow != null ? nd.minTempTomorrow + elevCorrC_OW : null;

    // ── Recommendations ───────────────────────────────────

    if (q === 'Blower Powder' || q === 'Powder') {
        if (!isHighSolar) {
            return { icon:'✅', label:'All day — conditions will hold',
                detail:`${asp}-facing terrain with canopy protection keeps powder cold and dry. No rush, but morning is always safest.` };
        }
        if (!softenHour || softenHour >= 14) {
            return { icon:'⏰', label:'Morning — cold forecast keeps it dry',
                detail:`Even on the ${asp} face, temps stay cold enough to hold powder today. Ride anytime this morning.` };
        }
        return {
            icon: isPast(softenHour) ? '⚡' : '⚡',
            label: isPast(softenHour)
                ? `Go now — softening underway since ${fmt(softenHour)}`
                : `Before ${fmt(softenHour)} — solar softening expected`,
            detail: isPast(softenHour)
                ? `Solar heating has been cooking the ${asp} face since ~${fmt(softenHour)}. Still worth going but act fast.`
                : `${asp}-facing solar hits at ${fmt(SOLAR[asp]?.[0]??9)}. Get there before ${fmt(softenHour)} to ride it cold and dry.`
        };
    }

    if (q === 'Settled Powder') {
        if (!isHighSolar) {
            return { icon:'✅', label:'Morning through early afternoon',
                detail:`${asp}-facing with canopy keeps settled snow firm and grippy. Morning preferred but conditions hold well.` };
        }
        if (!softenHour) {
            return { icon:'✅', label:'All day — too cold to soften',
                detail:`Despite the ${asp} sun exposure, temps stay below -3°C today. Settled powder holds.` };
        }
        return {
            icon: isPast(softenHour) ? '⚠️' : '⏰',
            label: isPast(softenHour)
                ? `Softening now — go immediately`
                : `Before ${fmt(softenHour)}`,
            detail: isPast(softenHour)
                ? `Solar warming on the ${asp} face has been softening settled snow since ~${fmt(softenHour)}. Conditions are turning sticky.`
                : `Settled powder on the ${asp} face will start softening around ${fmt(softenHour)} (${fahr(tempAt(softenHour))}°F). Get there early.`
        };
    }

    if (q === 'Corn Snow') {
        const cw = CORN[asp];
        if (cw) {
            const [cs, ce] = cw;
            const inNow    = nowH >= cs && nowH < ce;
            const pastNow  = nowH >= ce;
            if (pastNow) {
                return { icon:'⌛', label:`Window passed (~${fmt(cs)}–${fmt(ce)})`,
                    detail:`Today's corn window on the ${asp} face was ${fmt(cs)}–${fmt(ce)}. Surface is now getting too wet. Tomorrow should repeat if temps hold.` };
            }
            if (inNow) {
                return { icon:'🎯', label:`RIGHT NOW — prime corn window!`,
                    detail:`${asp}-facing corn is in the sweet spot (${fmt(cs)}–${fmt(ce)}). Top 1-2" soft, base still firm. Go!` };
            }
            return { icon:'🌽', label:`${fmt(cs)} – ${fmt(ce)}`,
                detail:`Corn window for the ${asp} face. Surface firms overnight, softens to perfection during this window. Don't go too early (icy) or too late (wet).` };
        }
        return { icon:'🌽', label:'Mid-morning, watch the surface',
            detail:`Corn is ready when the top 1-2" softens to a ball-bearing texture but the base stays firm. Time it by feel.` };
    }

    if (q === 'Wet/Heavy') {
        if (tomorrowMin !== null && tomorrowMin < -4) {
            const cornAspects = ['S','SE','SW','E'];
            if (cornAspects.includes(asp) && (nd.maxTempTomorrow ?? maxT) >= 0) {
                const cw = CORN[asp] ?? [10, 13];
                return { icon:'🌅', label:`Tomorrow ${fmt(cw[0])}–${fmt(cw[1])}`,
                    detail:`Tonight refreezes to ${fahr(tomorrowMin)}°F — that resets the melt-freeze cycle. Tomorrow's ${asp} face should be prime corn in the morning.` };
            }
            return { icon:'🌅', label:'Tomorrow morning',
                detail:`Tonight's refreeze (${fahr(tomorrowMin)}°F low) should firm things back up. Check conditions early tomorrow before solar softening restarts.` };
        }
        return { icon:'⛔', label:'Pass on today',
            detail:`Snow already saturated. Without a hard overnight freeze (forecast low ${maxT ? fahr(minT)+'°F' : 'unknown'}), conditions won't recover meaningfully.` };
    }

    // ── RESORT quality names ──────────────────────────────

    if (q === 'Spring Corn') {
        const cw = CORN[asp];
        if (cw) {
            const [cs, ce] = cw;
            const inNow   = nowH >= cs && nowH < ce;
            const pastNow = nowH >= ce;
            if (pastNow) {
                return { icon:'⌛', label:`Window passed (~${fmt(cs)}–${fmt(ce)})`,
                    detail:`Today's corn window on the ${asp} face was ${fmt(cs)}–${fmt(ce)}. Surface is firming back up. Tomorrow should repeat if overnight temps hold.` };
            }
            if (inNow) {
                return { icon:'🎯', label:`RIGHT NOW — prime corn window!`,
                    detail:`${asp}-facing corn is in the sweet spot (${fmt(cs)}–${fmt(ce)}). Top 1-2" soft, base still firm. Go now!` };
            }
            return { icon:'🌽', label:`${fmt(cs)} – ${fmt(ce)}`,
                detail:`Surface firms overnight, softens to perfect corn during this window on the ${asp} face. Don't go early (still icy) or late (gets wet).` };
        }
        return { icon:'🌽', label:'Mid-morning, watch the surface',
            detail:`Corn is ready when the top 1-2" softens to ball-bearing texture but the base stays firm. Time it by feel on the ${asp} face.` };
    }

    if (q === 'Prime Grooming') {
        // Check if tonight refreezes enough to set up corn tomorrow
        const cornAspects_pg = ['S','SE','SW','E','W'];
        const isCornEligible_pg = (month >= 2 && month <= 4) || (month === 1 && cornAspects_pg.includes(asp));
        if (isCornEligible_pg && tomorrowMin !== null && tomorrowMin < -2 &&
            (nd.maxTempTomorrow ?? maxT) >= 0) {
            const cw = CORN[asp] ?? [10.5, 13.5];
            return { icon:'🌅', label:`Tomorrow ${fmt(cw[0])}–${fmt(cw[1])} — corn expected`,
                detail:`Surface firmed back up. Tonight refreezes to ${fahr(tomorrowMin)}°F — tomorrow's ${asp} face should be prime corn. Hit it between ${fmt(cw[0])} and ${fmt(cw[1])} before it gets too wet.` };
        }
        return { icon:'⭐', label:'All day — especially morning',
            detail:`Groomers set firm and fast overnight. Cold corduroy holds well through midday on the ${asp} face. Best carving before any afternoon softening.` };
    }

    if (q === 'Powder Day') {
        if (!isHighSolar) {
            return { icon:'✅', label:'All day — powder will hold',
                detail:`${asp}-facing groomed runs keep fresh snow cold and dry. Morning is safest but conditions should hold through the day.` };
        }
        if (!softenHour || softenHour >= 14) {
            return { icon:'⏰', label:'Morning — cold forecast keeps it dry',
                detail:`Even on the ${asp} face, temps stay cold enough to hold powder. Get first chair for the best groomers.` };
        }
        return {
            icon:'⚡',
            label: isPast(softenHour)
                ? `Go now — softening since ${fmt(softenHour)}`
                : `Before ${fmt(softenHour)} — solar warming expected`,
            detail: isPast(softenHour)
                ? `Solar heating on the ${asp} face since ~${fmt(softenHour)}. Still good but act fast before groomers get heavy.`
                : `Get to ${asp}-facing runs before ${fmt(softenHour)} to ride fresh snow before it warms and gets grabby.`
        };
    }

    if (q === 'Icy/Hard Pack') {
        const cornAspects_ih = ['S','SE','SW','E','W'];
        const isCornEligible_ih = (month >= 2 && month <= 4) || (month === 1 && cornAspects_ih.includes(asp));
        if (isCornEligible_ih && maxT >= 0 && minT < -2) {
            const cw = CORN[asp];
            if (cw) {
                const [cs, ce] = cw;
                const inNow = nowH >= cs && nowH < ce;
                return { icon: inNow ? '🎯' : '🌽',
                    label: inNow ? 'NOW — softening to corn!' : `${fmt(cs)}–${fmt(ce)} — wait for corn window`,
                    detail:`Hard groomed surface will soften to rideable corn on the ${asp} face during the solar window. Stick to groomers; off-piste stays bulletproof.` };
            }
        }
        return { icon:'⭐', label:'Early morning — before solar softening',
            detail:`Hard groomed surface is fastest and most predictable first thing. Edges bite well. ${asp}-facing runs will soften later if temps allow.` };
    }

    if (q === 'Wet/Slushy') {
        if (tomorrowMin !== null && tomorrowMin < -4) {
            const cornAspects_ws = ['S','SE','SW','E','W'];
            const isCornEligible_ws = (month >= 2 && month <= 4) || (month === 1 && cornAspects_ws.includes(asp));
            if (isCornEligible_ws && (nd.maxTempTomorrow ?? maxT) >= 0) {
                const cw = CORN[asp] ?? [10.5, 13.5];
                return { icon:'🌅', label:`Tomorrow ${fmt(cw[0])}–${fmt(cw[1])} — corn expected`,
                    detail:`Tonight freezes to ${fahr(tomorrowMin)}°F — that resets the melt-freeze cycle. Tomorrow's ${asp} face should be prime corn.` };
            }
            return { icon:'🌅', label:'Tomorrow morning',
                detail:`Tonight's refreeze (${fahr(tomorrowMin)}°F) should firm the surface back up. Check grooming report early.` };
        }
        return { icon:'⛔', label:'Skip the afternoon',
            detail:`Wet and grabby on the ${asp} face. Without a hard overnight freeze, conditions stay slushy tomorrow too. Morning is best if you must go.` };
    }

    if (q === 'Good Conditions') {
        if (!isHighSolar) {
            return { icon:'✅', label:'All day',
                detail:`${asp}-facing terrain holds firm, consistent snow without significant solar softening. Groomed runs should be good throughout.` };
        }
        const sw = SOLAR[asp];
        if (sw) {
            return { icon:'⏰', label:`Morning through ~${fmt(sw[1])}`,
                detail:`Cold firm groomers this morning on the ${asp} face. Solar heating peaks around ${fmt(sw[1])} and may start softening the surface — morning is the sweet spot.` };
        }
        return { icon:'✅', label:'Morning preferred',
            detail:`Good groomed conditions. Cold morning keeps snow firm; surface may vary through the afternoon on the ${asp} face.` };
    }

    if (q === 'Wind Slab') {
        return { icon:'⚠️', label:'Check conditions before committing',
            detail:`Wind slab risk is highest on leeward aspects right now. Wait for winds to calm and give the slab 12-24h to settle or bond.` };
    }

    if (q === 'Crusty/Ice') {
        const cornAspects = ['S','SE','SW','E'];
        if (cornAspects.includes(asp) && maxT >= 0 && minT < -2) {
            const cw = CORN[asp];
            if (cw) {
                const [cs, ce] = cw;
                const inNow = nowH >= cs && nowH < ce;
                return {
                    icon: inNow ? '🎯' : '🌽',
                    label: inNow ? 'NOW — crust softening to corn!' : `${fmt(cs)} – ${fmt(ce)}`,
                    detail: `Icy crust from overnight freeze should soften to rideable corn on the ${asp} face during peak solar. Time it right or the window is narrow.`
                };
            }
        }
        return { icon:'⛔', label:'Not today — wait for snow or corn conditions',
            detail:`Icy/crusty on the ${asp} face won't improve significantly today. Check back after a storm or when a solid melt-freeze cycle sets up.` };
    }

    // Variable/Thin
    return { icon:'❓', label:'Check local beta first',
        detail:`Variable snowpack — conditions can differ a lot from the forecast model. Worth checking with locals or a recent trip report.` };
}

// ════════════════════════════════════════════════════════════
// ASPECT SELECTION — called when a wedge or grid cell is clicked
// Shows per-aspect snow quality + optimal time in the detail card
// ════════════════════════════════════════════════════════════
function selectAspect(zoneId, asp) {
    const c = cache[zoneId];
    const z = ZONES.find(z => z.id === zoneId);
    if (!c?.nd || !z) return;

    const isTmr   = activeTab === 'tomorrow';
    const nd       = isTmr ? buildTomorrowNd(c.nd) : c.nd;
    // Build a virtual zone for the clicked aspect (same canopy/elev, different direction)
    const tempZone = { ...z, aspect: asp };
    const q  = (z.type==='resort' ? classifyResort : classify)(nd, tempZone);
    const ow = getOptimalWindow(nd, tempZone);

    // ── Dim all wedge paths, highlight the clicked one ───────
    ASPECTS.forEach(a => {
        const path = document.getElementById(`asp-path-${zoneId}-${a}`);
        if (!path) return;
        if (a === asp) {
            path.setAttribute('stroke', '#ffffff');
            path.setAttribute('stroke-width', '2.5');
            path.setAttribute('opacity', '1');
        } else {
            path.setAttribute('stroke', 'rgba(0,0,0,.25)');
            path.setAttribute('stroke-width', '0.6');
            path.setAttribute('opacity', '0.38');
        }
    });

    // ── Highlight selected grid cell, clear others ───────────
    document.querySelectorAll('.asp-cell').forEach(el => el.classList.remove('selected'));
    const cellEl = document.getElementById(`asp-cell-${zoneId}-${asp}`);
    if (cellEl) cellEl.classList.add('selected');

    // Update the arc first — works on both today and tomorrow tabs.
    // Must happen before the aspectDetail guard because the tomorrow panel has no #aspectDetail.
    const arcBox = document.getElementById('dayArcBox');
    if (arcBox) arcBox.innerHTML = renderDayArc(nd, tempZone, !isTmr);

    // ── Render detail card (today tab only) ───────────────────
    const el = document.getElementById('aspectDetail');
    if (!el) return;
    const isPrimary = asp === z.aspect;

    el.style.display = 'block';
    el.innerHTML = `
        <div class="ad-header">
            <span style="font-size:1.1rem">${q.emoji}</span>
            <span class="ad-asp-label">${asp}-facing</span>
            ${isPrimary ? '<span class="ad-primary-badge">Primary Aspect</span>' : ''}
        </div>
        <div class="ad-quality" style="color:${q.color}">${q.quality}</div>
        <p class="ad-reason">${q.reason}</p>`;

    // Smooth-scroll so the card is visible
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ════════════════════════════════════════════════════════════
// ASPECT ROSE SVG
// Generates a compass rose with 8 color-coded sectors.
// primaryAsp = the zone's main aspect (highlighted with white border).
// ════════════════════════════════════════════════════════════
function buildRoseSVG(aqs, primaryAsp, size=170, zoneId=null) {
    const cx=size/2, cy=size/2;
    const outerR=size*0.42, innerR=size*0.15;
    const f=n=>n.toFixed(2);
    const toRad=d=>(d-90)*Math.PI/180; // 0° = top = North

    function sectorPath(asp) {
        const deg=ASP_DEG[asp], q=aqs[asp], isPrim=asp===primaryAsp;
        const s=toRad(deg-22.5), e=toRad(deg+22.5);
        const xi1=cx+innerR*Math.cos(s),yi1=cy+innerR*Math.sin(s);
        const xo1=cx+outerR*Math.cos(s),yo1=cy+outerR*Math.sin(s);
        const xo2=cx+outerR*Math.cos(e),yo2=cy+outerR*Math.sin(e);
        const xi2=cx+innerR*Math.cos(e),yi2=cy+innerR*Math.sin(e);
        const p=`M${f(xi1)} ${f(yi1)} L${f(xo1)} ${f(yo1)} A${outerR} ${outerR} 0 0 1 ${f(xo2)} ${f(yo2)} L${f(xi2)} ${f(yi2)} A${innerR} ${innerR} 0 0 0 ${f(xi1)} ${f(yi1)}Z`;
        const idAttr  = zoneId ? ` id="asp-path-${zoneId}-${asp}"` : '';
        const click   = zoneId ? ` onclick="selectAspect('${zoneId}','${asp}')" style="cursor:pointer"` : '';
        return `<path d="${p}" fill="${q.color}" stroke="${isPrim?'#fff':'rgba(0,0,0,.3)'}" stroke-width="${isPrim?2:.6}" opacity="${isPrim?1:.85}" title="${asp}: ${q.quality}"${idAttr}${click}/>`;
    }

    // Cardinal labels (N E S W outside ring)
    const lR=outerR+11;
    const cardinals=[
        {t:'N',x:cx,      y:cy-lR-1,  a:'middle'},
        {t:'E',x:cx+lR+3, y:cy+4,     a:'start'},
        {t:'S',x:cx,      y:cy+lR+12, a:'middle'},
        {t:'W',x:cx-lR-3, y:cy+4,     a:'end'},
    ];
    const lbls=cardinals.map(l=>`<text x="${f(l.x)}" y="${f(l.y)}" fill="#6b93b0" font-size="9" font-family="sans-serif" text-anchor="${l.a}" font-weight="700">${l.t}</text>`).join('');

    // Small tick marks at intercardinal points (NE NW SE SW)
    const ticks=[45,135,225,315].map(d=>{
        const r=toRad(d),t1=outerR+2,t2=outerR+7;
        return `<line x1="${f(cx+t1*Math.cos(r))}" y1="${f(cy+t1*Math.sin(r))}" x2="${f(cx+t2*Math.cos(r))}" y2="${f(cy+t2*Math.sin(r))}" stroke="#2d4159" stroke-width="1.5"/>`;
    }).join('');

    // North arrow in center hole
    const arrowH=innerR*0.7, arrowW=3;
    const arrow=`<polygon points="${f(cx)},${f(cy-arrowH)} ${f(cx-arrowW)},${f(cy+arrowW)} ${f(cx+arrowW)},${f(cy+arrowW)}" fill="#6b93b0"/>`;
    const center=`<circle cx="${f(cx)}" cy="${f(cy)}" r="${f(innerR-1)}" fill="#1b2d42" stroke="#2d4159" stroke-width="1"/>`;

    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`+
        ASPECTS.map(sectorPath).join('')+ticks+center+arrow+lbls+`</svg>`;
}

// Small mini-rose for zone list
function buildMiniRoseSVG(aqs, size=28) {
    const cx=size/2, cy=size/2, outerR=size*0.45, innerR=size*0.12;
    const f=n=>n.toFixed(2), toRad=d=>(d-90)*Math.PI/180;
    const sectors=ASPECTS.map(asp=>{
        const q=aqs[asp],deg=ASP_DEG[asp],s=toRad(deg-22.5),e=toRad(deg+22.5);
        const xi1=cx+innerR*Math.cos(s),yi1=cy+innerR*Math.sin(s);
        const xo1=cx+outerR*Math.cos(s),yo1=cy+outerR*Math.sin(s);
        const xo2=cx+outerR*Math.cos(e),yo2=cy+outerR*Math.sin(e);
        const xi2=cx+innerR*Math.cos(e),yi2=cy+innerR*Math.sin(e);
        const p=`M${f(xi1)} ${f(yi1)} L${f(xo1)} ${f(yo1)} A${outerR} ${outerR} 0 0 1 ${f(xo2)} ${f(yo2)} L${f(xi2)} ${f(yi2)} A${innerR} ${innerR} 0 0 0 ${f(xi1)} ${f(yi1)}Z`;
        return `<path d="${p}" fill="${q.color}" stroke="rgba(0,0,0,.2)" stroke-width=".4"/>`;
    }).join('');
    const ctr=`<circle cx="${f(cx)}" cy="${f(cy)}" r="${f(innerR-.5)}" fill="#1b2d42"/>`;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${sectors}${ctr}</svg>`;
}


// ════════════════════════════════════════════════════════════
// FETCH HELPERS — timeout + localStorage cache (30-min TTL)
// ════════════════════════════════════════════════════════════
const CACHE_TTL = 30 * 60 * 1000; // 30 minutes

function wxCacheGet(key) {
    try {
        // localStorage persists across tab closes (unlike sessionStorage which clears on iOS
        // every time the tab is closed), so the 30-min TTL actually helps on mobile.
        const raw = localStorage.getItem('wx_' + key);
        if (!raw) return null;
        const {ts, payload} = JSON.parse(raw);
        if (Date.now() - ts > CACHE_TTL) return null;
        return payload;
    } catch { return null; }
}
function wxCacheSet(key, payload) {
    try { localStorage.setItem('wx_' + key, JSON.stringify({ts:Date.now(), payload})); }
    catch {} // ignore private-browsing / storage-full errors
}

async function fetchWithTimeout(url, ms=10000) {
    // AbortController actually cancels the underlying network request on iOS —
    // Promise.race alone leaves ghost requests draining the cellular connection.
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), ms);
    try {
        const r = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
    } catch(e) {
        clearTimeout(id);
        if (e.name === 'AbortError') throw new Error(`Timed out after ${ms/1000}s`);
        throw e;
    }
}

// Retry up to 2 times with backoff (1.5s, 3s) — 3 retries at 20s each = 60s hang on mobile
async function fetchWithRetry(url, ms=10000, attempts=2) {
    let lastErr;
    for (let i = 0; i < attempts; i++) {
        try { return await fetchWithTimeout(url, ms); }
        catch(e) {
            lastErr = e;
            if (i < attempts - 1) {
                await new Promise(r => setTimeout(r, 1500 * Math.pow(2, i)));
            }
        }
    }
    // Friendlier message for network-level failures
    if (lastErr.message === 'Failed to fetch' || lastErr.message.includes('NetworkError') || lastErr.name === 'AbortError') {
        throw new Error('Network unavailable — check your connection or disable any ad blocker for this page');
    }
    throw lastErr;
}

// ════════════════════════════════════════════════════════════
// OPEN-METEO — batch forecast for all zones in one round-trip
// ════════════════════════════════════════════════════════════
const FORECAST_DAYS = 30;

// Single forecast call for all 10 zones (comma-separated lat/lon → array response)
async function fetchAllZonesBatch() {
    const lats = ZONES.map(z => z.lat).join(',');
    const lons = ZONES.map(z => z.lon).join(',');
    const url =
        `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}` +
        `&current=temperature_2m,snow_depth,windspeed_10m,rain,snowfall` +
        `&daily=temperature_2m_max,temperature_2m_min,temperature_2m_mean,` +
        `snowfall_sum,rain_sum,windspeed_10m_max` +
        `&past_days=${FORECAST_DAYS}&forecast_days=3&timezone=America%2FNew_York`;
    const data = await fetchWithRetry(url, 12000);
    return Array.isArray(data) ? data : [data];
}

// Single archive call for all zones (same date window for every zone)
async function fetchArchiveBatch(startDate, endDate) {
    const lats = ZONES.map(z => z.lat).join(',');
    const lons = ZONES.map(z => z.lon).join(',');
    const url =
        `https://archive-api.open-meteo.com/v1/archive?latitude=${lats}&longitude=${lons}` +
        `&start_date=${startDate}&end_date=${endDate}&daily=snowfall_sum&timezone=America%2FNew_York`;
    const data = await fetchWithRetry(url, 12000);
    return Array.isArray(data) ? data : [data];
}

// Hourly temps batch — today + tomorrow only (48h), used for overnight refreeze model
// Indices 17-31 = 5pm today → 7am tomorrow = tonight's actual overnight window
async function fetchHourlyBatch() {
    const lats = ZONES.map(z => z.lat).join(',');
    const lons = ZONES.map(z => z.lon).join(',');
    const url =
        `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}` +
        `&hourly=temperature_2m&past_days=0&forecast_days=2&timezone=America%2FNew_York`;
    const data = await fetchWithRetry(url, 10000);
    return Array.isArray(data) ? data : [data];
}

// Per-zone fallback (used only when batch fails)
async function fetchOpenMeteo(lat, lon) {
    const url =
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,snow_depth,windspeed_10m,rain,snowfall` +
        `&daily=temperature_2m_max,temperature_2m_min,temperature_2m_mean,` +
        `snowfall_sum,rain_sum,windspeed_10m_max` +
        `&past_days=${FORECAST_DAYS}&forecast_days=3&timezone=America%2FNew_York`;
    const data = await fetchWithRetry(url);
    const now = new Date();
    const seasonStart = new Date(now.getMonth() < 7 ? now.getFullYear() - 1 : now.getFullYear(), 9, 15);
    const windowStart = new Date(now); windowStart.setDate(windowStart.getDate() - FORECAST_DAYS);
    data._archiveSnowCm = 0;
    if (seasonStart < windowStart) {
        const s = seasonStart.toISOString().slice(0, 10);
        const e = new Date(windowStart - 86400000).toISOString().slice(0, 10);
        try {
            const arch = await fetchWithRetry(
                `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}` +
                `&start_date=${s}&end_date=${e}&daily=snowfall_sum&timezone=America%2FNew_York`
            );
            if (arch?.daily?.snowfall_sum) {
                data._archiveSnowCm = arch.daily.snowfall_sum.reduce((a, v) => a + (v ?? 0), 0);
            }
        } catch (_) {}
    }
    return data;
}

// ════════════════════════════════════════════════════════════
// LAZY CHART.JS — loaded on first zone-detail open
// ════════════════════════════════════════════════════════════
let _chartJsPromise = null;
function ensureChartJs() {
    if (window.Chart) return Promise.resolve();
    if (!_chartJsPromise) {
        _chartJsPromise = new Promise((res, rej) => {
            const s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
            s.onload = res; s.onerror = () => rej(new Error('Chart.js failed to load'));
            document.head.appendChild(s);
        });
    }
    return _chartJsPromise;
}

function normalizeOpenMeteo(data, hourlyData=null) {
    if (!data || !data.daily || !data.daily.time?.length) {
        throw new Error('Open-Meteo returned unexpected data structure');
    }
    const curr = data.current ?? {};
    const d    = data.daily;

    // Find today's index in the daily array by date string comparison
    const today = getTodayNY();
    let ci = 0;
    for (let i = 0; i < d.time.length; i++) { if (d.time[i] <= today) ci = i; }

    const sumD = (arr, s, e) =>
        arr.slice(Math.max(0,s), e+1).reduce((a,b) => a+(b??0), 0);
    const maxD = (arr, s, e) => {
        const v = arr.slice(Math.max(0,s), e+1).filter(x => x!=null);
        return v.length ? Math.max(...v) : null;
    };
    const minD = (arr, s, e) => {
        const v = arr.slice(Math.max(0,s), e+1).filter(x => x!=null);
        return v.length ? Math.min(...v) : null;
    };

    const curT   = curr.temperature_2m ?? d.temperature_2m_max[ci] ?? 0;
    const l3s    = ci - 2;  // 3-day window start
    const l7s    = ci - 6;  // 7-day window start

    // ── Seasonal snowfall: Oct 1 of current ski season → today ───────────
    // This is the key fix for base-depth accuracy. The model snow_depth field
    // is unreliable on mountainous terrain; cumulative seasonal snowfall is a
    // far better proxy for whether a real base exists.
    const now        = new Date();
    const nowMonth   = now.getMonth(); // 0=Jan…11=Dec
    const nowYear    = now.getFullYear();
    // Season starts Oct 15 of the previous calendar year if we're Jan–Jun,
    // otherwise Oct 15 of the current year (e.g. Feb 2026 → season start Oct 15 2025)
    const seasonStartYear = nowMonth < 7 ? nowYear - 1 : nowYear;
    const seasonStart     = `${seasonStartYear}-10-15`;

    let snowfall_season_cm = data._archiveSnowCm ?? 0; // early-season gap from archive API
    for (let i = 0; i <= ci; i++) {
        if (d.time[i] >= seasonStart) snowfall_season_cm += d.snowfall_sum[i] ?? 0;
    }

    // Rough compacted-base estimate: seasonal snow * 0.35 compaction factor,
    // capped conservatively. Used as a fallback when model snow_depth seems off.
    // 100cm seasonal snowfall ≈ 35cm (~14") estimated base after compaction.
    const estimatedBaseM = Math.min(snowfall_season_cm * 0.0035, 2.5); // 0.0035 = 0.35/100 * cm→m

    // Chart: one entry per day, isForecast = days after today
    const chartDays = d.time.map((t, i) => {
        const dt   = new Date(t + 'T12:00:00');
        const label = isNaN(dt) ? t : dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        const mean  = d.temperature_2m_mean?.[i];
        const avgTempF = (mean != null ? mean : ((d.temperature_2m_max[i]??0)+(d.temperature_2m_min[i]??0))/2) * 9/5 + 32;
        return { label, avgTempF, snowIn: +((d.snowfall_sum[i]??0)/2.54).toFixed(2), isForecast: i > ci };
    });

    return {
        source:'OpenMeteo', stationId:null, stationName:null, stationDistMi:null,
        currentTempC:    curT,
        maxTempC_72h:    maxD(d.temperature_2m_max, l3s, ci) ?? curT,
        minTempC_72h:    minD(d.temperature_2m_min, l3s, ci) ?? curT,
        // Today's specific forecast min/max (for diurnal curve in optimal window calc)
        maxTempToday:    d.temperature_2m_max[ci]   ?? curT,
        minTempToday:    d.temperature_2m_min[ci]   ?? curT,
        // Tomorrow's temps (for overnight refreeze / next-day corn potential)
        maxTempTomorrow: d.temperature_2m_max[ci+1] ?? null,
        minTempTomorrow: d.temperature_2m_min[ci+1] ?? null,
        // Tomorrow's full forecast (for Tomorrow tab)
        snowTomorrow_cm:  d.snowfall_sum[ci+1]          ?? 0,
        rainTomorrow_mm:  d.rain_sum[ci+1]               ?? 0,
        windTomorrow_kmh: d.windspeed_10m_max[ci+1]      ?? 0,
        // Day-after-tomorrow (becomes "tomorrow" when classifying tomorrow's nd)
        maxTempDay2: d.temperature_2m_max[ci+2] ?? null,
        minTempDay2: d.temperature_2m_min[ci+2] ?? null,
        snow24h_cm:      d.snowfall_sum[ci] ?? 0,
        snow72h_cm:      sumD(d.snowfall_sum, l3s, ci),
        snow7d_cm:       sumD(d.snowfall_sum, l7s, ci),
        rain24h_mm:      d.rain_sum[ci] ?? 0,
        rain72h_mm:      sumD(d.rain_sum, l3s, ci),
        maxWind24h_kmh:  d.windspeed_10m_max[ci] ?? 0,
        // snow_depth from model is unreliable on complex terrain;
        // use the larger of model depth OR our compaction-derived estimate
        snowDepthM:      Math.max(curr.snow_depth ?? 0, estimatedBaseM),
        snowfall_season_cm,   // full Oct 1 → today accumulation
        estimatedBaseM,       // compaction estimate (for display/debug)
        // Tonight's actual hourly temps: 5pm today → 7am tomorrow (15 values, 1 hr each).
        // Used by getOvernightRefreeze() instead of cosine-curve approximation when available.
        // Indices 17-31 from Open-Meteo hourly array (past_days=0, midnight-anchored local time).
        tonightTemps: hourlyData?.hourly?.temperature_2m?.slice(17, 32) ?? null,
        chartDays
    };
}

// MAP (MapLibre GL JS — 3D terrain with tilt/rotate)
// ════════════════════════════════════════════════════════════
let map, markers={}, markerEls={}, weatherChart=null;
let cache={}, activeId=null, activeTab='today', activeTrailHour='now';
let satActive=false, sunRayLine=null, sunMarker=null, timeOverride=null;
const WEDGE_RADIUS=1400; // meters
const VT_CENTER_LAT=43.08, VT_CENTER_LON=-72.86;
// Dynamic probe zones — created by clicking on the map
const probeZones = [];   // [{id, name, lat, lon, elev, aspect, canopy, type}, ...]
let probeCounter = 0;

function toggleSatellite() {
    if (!map) return;
    satActive = !satActive;
    if (satActive) {
        map.setLayoutProperty('usgs-topo-layer', 'visibility', 'none');
        map.setLayoutProperty('satellite-layer', 'visibility', 'visible');
    } else {
        map.setLayoutProperty('satellite-layer', 'visibility', 'none');
        map.setLayoutProperty('usgs-topo-layer', 'visibility', 'visible');
    }
    const btn = document.getElementById('satBtn');
    btn.classList.toggle('active', satActive);
    btn.textContent = satActive ? '🗺️ Topo' : '🛰️ Satellite';
}

// Pre-grouped terrain geometry cache: zoneId → { N: [[ring],...], E: [[ring],...], ... }
// Built once when DEM finishes; avoids re-iterating thousands of cells on every slider tick.
const _terrainGeomCache = {};

function ensureTerrainGeomCache(zoneId) {
    if (_terrainGeomCache[zoneId]) return _terrainGeomCache[zoneId];
    const tg = zoneAspectGrids[zoneId];
    if (!tg || !tg.cells || tg.cells.length === 0) return null;
    const byDir = {};
    ASPECTS.forEach(a => { byDir[a] = []; });
    tg.cells.forEach(cell => {
        if (byDir[cell.dir]) byDir[cell.dir].push([cell.ring]);
    });
    _terrainGeomCache[zoneId] = byDir;
    return byDir;
}

// Helper: extract color/quality from either classify() {color,quality} or classifyAtHour() {c,q}
function qColor(q) { return q?.color ?? q?.c ?? '#546E7A'; }
function qLabel(q) { return q?.quality ?? q?.q ?? 'Unknown'; }

// Build GeoJSON FeatureCollection of all zone wedge polygons
function buildWedgeGeoJSON(hourOverride) {
    const features = [];
    const LAPSE_F = 1.5, ELEV_BASE = 1500;
    const allZones = [...ZONES, ...probeZones];
    allZones.forEach(z => {
        const c = cache[z.id];
        if (!c?.nd) return;
        const nd = c.nd;
        let aqs = c.aspectQualities;
        // If hour override, compute conditions at that hour
        if (hourOverride != null) {
            const elevCorrC = (z.elev ?? 0) > ELEV_BASE ? -(((z.elev ?? 0) - ELEV_BASE) / 1000) * (LAPSE_F / 1.8) : 0;
            const rawMin = nd.minTempToday ?? nd.minTempC_72h;
            const rawMax = nd.maxTempToday ?? nd.maxTempC_72h;
            if (rawMin == null || rawMax == null) return; // no temp data
            const minT = rawMin + elevCorrC, maxT = rawMax + elevCorrC;
            const avg = (maxT + minT) / 2, amp = (maxT - minT) / 2;
            const curT = avg + amp * Math.cos(2 * Math.PI * (hourOverride - 14) / 24);
            const classifyFn = z.type === 'resort' ? classifyResortAtHour : classifyBCAtHour;
            aqs = {};
            ASPECTS.forEach(asp => { aqs[asp] = classifyFn(nd, { ...z, aspect: asp }, hourOverride, curT); });
        }
        if (!aqs) return;
        const isActive = z.id === activeId;

        // ── Terrain-aware path: use pre-grouped DEM cells ──
        const grouped = ensureTerrainGeomCache(z.id);
        if (grouped) {
            ASPECTS.forEach(asp => {
                const polys = grouped[asp];
                if (!polys || polys.length === 0) return;
                const q = aqs[asp];
                features.push({
                    type: 'Feature',
                    properties: {
                        zoneId: z.id, aspect: asp,
                        color: qColor(q),
                        opacity: isActive ? 0.82 : 0.65,
                        isPrimary: asp === z.aspect,
                        quality: qLabel(q)
                    },
                    geometry: { type: 'MultiPolygon', coordinates: polys }
                });
            });
        } else {
            // ── Fallback: geometric pie-slice wedges (DEM not loaded yet) ──
            ASPECTS.forEach(asp => {
                const q = aqs[asp];
                const pts = wedgePoly(z.lat, z.lon, ASP_DEG[asp], WEDGE_RADIUS);
                const coords = pts.map(p => [p[1], p[0]]);
                if (coords.length > 0 && (coords[0][0] !== coords[coords.length-1][0] || coords[0][1] !== coords[coords.length-1][1])) {
                    coords.push(coords[0]);
                }
                features.push({
                    type: 'Feature',
                    properties: {
                        zoneId: z.id, aspect: asp,
                        color: qColor(q),
                        opacity: isActive ? 0.82 : 0.65,
                        isPrimary: asp === z.aspect,
                        quality: qLabel(q)
                    },
                    geometry: { type: 'Polygon', coordinates: [coords] }
                });
            });
        }
    });
    return { type: 'FeatureCollection', features };
}

function initMap() {
    const startZoom = window.innerWidth <= 768 ? 9 : 10;

    map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            sources: {
                'usgs-topo': {
                    type: 'raster',
                    tiles: ['https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}'],
                    tileSize: 256, maxzoom: 16,
                    attribution: '© <a href="https://www.usgs.gov">USGS</a> National Map'
                },
                'satellite': {
                    type: 'raster',
                    tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                    tileSize: 256, maxzoom: 19,
                    attribution: '© Esri'
                },
                'terrarium': {
                    type: 'raster-dem',
                    tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
                    encoding: 'terrarium',
                    tileSize: 256, maxzoom: 15
                }
            },
            terrain: { source: 'terrarium', exaggeration: 1.5 },
            layers: [
                { id: 'usgs-topo-layer', type: 'raster', source: 'usgs-topo' },
                { id: 'satellite-layer', type: 'raster', source: 'satellite', layout: { visibility: 'none' } }
            ]
        },
        center: [VT_CENTER_LON, VT_CENTER_LAT],
        zoom: startZoom,
        pitch: 45,
        bearing: -15,
        maxPitch: 85,
        antialias: true
    });

    // Navigation: scroll zoom, right-click drag to tilt/rotate
    map.addControl(new maplibregl.NavigationControl({ showCompass: true, showZoom: true, visualizePitch: true }), 'top-right');

    map.on('load', () => {
        // ── Wedge polygons as GeoJSON fill layer ──
        map.addSource('wedges', { type: 'geojson', data: buildWedgeGeoJSON() });
        map.addLayer({
            id: 'wedges-fill', type: 'fill', source: 'wedges',
            paint: {
                'fill-color': ['get', 'color'],
                'fill-opacity': ['get', 'opacity']
            }
        });
        map.addLayer({
            id: 'wedges-outline', type: 'line', source: 'wedges',
            paint: {
                'line-color': 'rgba(0,0,0,0.12)',
                'line-width': ['case', ['get', 'isPrimary'], 2, 0.3]
            }
        });

        // ── Sun ray line layer ──
        map.addSource('sun-ray', {
            type: 'geojson',
            data: { type: 'FeatureCollection', features: [] }
        });
        map.addLayer({
            id: 'sun-ray-line', type: 'line', source: 'sun-ray',
            paint: { 'line-color': '#FFD54F', 'line-width': 2, 'line-opacity': 0.6, 'line-dasharray': [4, 3] }
        });

        // Click on wedge → select zone
        map.on('click', 'wedges-fill', e => {
            if (e.features?.length) selectZone(e.features[0].properties.zoneId);
        });
        map.on('mouseenter', 'wedges-fill', () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', 'wedges-fill', () => { map.getCanvas().style.cursor = ''; });

        // Click anywhere (not on a wedge) → probe terrain conditions
        map.on('click', e => {
            // If the click hit a wedge-fill feature, the wedges-fill handler already ran
            const wedgeHit = map.queryRenderedFeatures(e.point, { layers: ['wedges-fill'] });
            if (wedgeHit.length > 0) return; // already handled by selectZone
            handleTerrainProbe(e);
        });

        // Show time slider now that map is loaded
        initTimeSlider();
        initLegend();

        // Start loading DEM terrain data for aspect-aware wedges

    const hint = document.getElementById('viewHint');

function selectZone(id) {
    // Selecting a named zone clears any probe points
    if (!id.startsWith('probe_')) clearAllProbes();
    const prev=activeId; activeId=id;
    // Refresh old zone (less intense wedge opacity)
    if(prev){ refreshMarker(prev); updateWedges(prev); }
    refreshMarker(id); updateWedges(id);

    document.querySelectorAll('.zitem').forEach(e=>e.classList.remove('active'));
    const li=document.getElementById(`li-${id}`); if(li) li.classList.add('active');

    renderDetail(id);
    const z = ZONES.find(z=>z.id===id) || probeZones.find(p=>p.id===id);
    if(z && map) map.flyTo({center:[z.lon,z.lat],duration:800});

    // On mobile: slide into full-screen detail view
    if (window.innerWidth <= 768) {
        const z2 = ZONES.find(z => z.id === id) || probeZones.find(p => p.id === id);
        openMobileDetail(z2?.name);
    }
}

// ════════════════════════════════════════════════════════════
// DAY ARC — hourly classification + timeline rendering
// Simulates what conditions will be at each hour of the ski day
// using a diurnal temperature model, then merges into blocks.
// ════════════════════════════════════════════════════════════

function classifyResortAtHour(nd, zone, h, curT) {
    const {maxTempC_72h:rawMaxT72, minTempC_72h:rawMinT72,
           maxTempToday:rawMaxToday, minTempToday:rawMinToday,
           snow24h_cm:s24, rain24h_mm:r24, rain72h_mm:r72} = nd;
    // Use today's forecast temps for daily condition checks — aligns with diurnal model
    const rawMaxT=rawMaxToday??rawMaxT72, rawMinT=rawMinToday??rawMinT72;
    const LAPSE_F=1.5, ELEV_BASE=1500;
    const elevCorrC=(zone.elev??0)>ELEV_BASE ? -((zone.elev-ELEV_BASE)/1000)*(LAPSE_F/1.8) : 0;
    const minT=rawMinT+elevCorrC;
    const month=new Date().getMonth(), isCornSeason=month>=2&&month<=4;
    // Peak solar multipliers per aspect (at peak hour)
    const sM={N:.05,NE:.22,NW:.14,E:.65,W:.60,SE:.85,SW:.78,S:.95};
    // Hour of peak direct sun for each aspect
    const peakH={N:12,NE:9,E:9,SE:10.5,S:12,SW:13.5,W:15,NW:15}[zone.aspect]??12;
    const spr=isCornSeason?1.5:(month===1?1.15:1.0);
    const isW=month<=1||month>=10;
    const cM=({conifer:.45,mixed:isW?.65:.50,deciduous:isW?.85:.45,open:1.0})[zone.canopy??'open'];
    // Time-varying solar: cosine bell centred on peakH, 6h half-period, floor 0.15
    const rawSolar=(sM[zone.aspect]??0.55)*spr*Math.max(0.15,Math.cos(Math.PI*(h-peakH)/6));
    const solar=rawSolar*cM;
    const rainThenFreeze=r72>3&&curT<-2;
    // overnightHardFreeze: did it freeze hard enough to lock in morning ice?
    // No max-temp requirement — morning ice depends only on the overnight low, not tomorrow's high.
    // (A cold day with max +1°C at the valley floor can still have a rock-hard icy morning.)
    const overnightHardFreeze_r = Math.min(rawMinT,(rawMinT72??rawMinT))<-4;
    // icyMorning: hard overnight freeze + early-morning hours = icy trail surface
    const icyMorning_r = overnightHardFreeze_r && h < 9;
    // freezeThaw: FULL melt-refreeze cycle (needs daytime warmth too) — for solar crust & midday ice
    const freezeThaw=rawMaxT>0&&overnightHardFreeze_r;
    const solarSoft=rawSolar>0.55&&curT>-4;
    const cornCycle=rawMaxT>=0&&rawMaxT<=8&&rawMinT>=-16&&rawMinT<=-2;
    const cornAsp=['S','SE','SW','E','W'];
    const cornElig=isCornSeason||(month===1&&cornAsp.includes(zone.aspect));
    // Corn window extends to aspect's peak + 3h (W faces can corn in late afternoon)
    const cornEnd=Math.min(17,peakH+3);
    if(s24>10&&curT<-2&&r72<1)              return{q:'Powder Day',   c:'#1565C0',e:'❄️'};
    if(r24>5&&!rainThenFreeze)               return{q:'Wet/Slushy',   c:'#C62828',e:'💦'};
    // Icy/Hard Pack: morning refreeze (no warmth needed) OR solar-driven midday crust
    if(rainThenFreeze||(s24<5&&(icyMorning_r||(freezeThaw&&solar>0.25))&&h<10))
                                             return{q:'Icy/Hard Pack',c:'#78909C',e:'🧊'};
    if(cornElig&&cornCycle&&rawSolar>0.25&&h<cornEnd)
                                             return{q:'Spring Corn',  c:'#F9A825',e:'🌽'};
    if(cornElig&&cornCycle&&h>=cornEnd&&curT<-1) return{q:'Icy/Hard Pack',c:'#78909C',e:'🧊'};
    if(curT>1||solarSoft)                   return{q:'Wet/Slushy',   c:'#C62828',e:'💦'};
    if(curT<-4&&minT<-8&&s24<10&&!cornCycle)return{q:'Prime Grooming',c:'#00897B',e:'⭐'};
    // Persistent Icy/Hard Pack: if overnight froze hard and surface still cold,
    // the icy pack stays all day — curT>1 and solarSoft are already caught by Wet/Slushy above.
    // curT < -1 threshold keeps near-freezing groomed runs in "Good Conditions" range.
    if(overnightHardFreeze_r&&s24<5&&curT<-1)return{q:'Icy/Hard Pack',c:'#78909C',e:'🧊'};
    // Close the 0–1°C gap: Good Conditions up to the activeMelt threshold (curT<1)
    if(curT<1)                              return{q:'Good Conditions',c:'#1976D2',e:'🎿'};
                                            return{q:'Variable',     c:'#37474F',e:'❓'};
}

function classifyBCAtHour(nd, zone, h, curT) {
    // Mirrors classify() logic as closely as possible — same thresholds, same priority order.
    const {maxTempC_72h:rawMaxT72,minTempC_72h:rawMinT72,
           maxTempToday:rawMaxToday,minTempToday:rawMinToday,
           snow24h_cm:s24,snow72h_cm:s72,snow7d_cm:s7,
           rain24h_mm:r24,rain72h_mm:r72,wind10m_kmh:wind=0,
           snowDepthM:depthM=0,snowfall_season_cm:seasonSnow=0} = nd;
    // Use today's forecast min/max for daily condition checks — keeps arc consistent
    // with the diurnal temperature model in getDayTimeline (which also uses maxTempToday/minTempToday).
    // 72h extremes are kept for multi-day history checks (warmRainyMeltout).
    const rawMaxT=rawMaxToday??rawMaxT72, rawMinT=rawMinToday??rawMinT72;
    const LAPSE_F=1.5,ELEV_BASE=1500;
    const elevCorrC=(zone.elev??0)>ELEV_BASE ? -((zone.elev-ELEV_BASE)/1000)*(LAPSE_F/1.8) : 0;
    const maxT=rawMaxT+elevCorrC, minT=rawMinT+elevCorrC;
    const month=new Date().getMonth(), isCornSeason=month>=2&&month<=4;
    // Peak solar multipliers per aspect (at peak hour)
    const sM={N:.05,NE:.22,NW:.14,E:.65,W:.60,SE:.85,SW:.78,S:.95};
    // Hour of peak direct sun for each aspect
    const peakH={N:12,NE:9,E:9,SE:10.5,S:12,SW:13.5,W:15,NW:15}[zone.aspect]??12;
    const spr=isCornSeason?1.5:(month===1?1.15:1.0);
    const isW=month<=1||month>=10;
    const cM=({conifer:.45,mixed:isW?.65:.50,deciduous:isW?.85:.45,open:1.0})[zone.canopy??'open'];
    // Time-varying solar: cosine bell centred on peakH, 6h half-period, floor 0.15
    const rawSolar=(sM[zone.aspect]??0.55)*spr*Math.max(0.15,Math.cos(Math.PI*(h-peakH)/6));
    const solar=rawSolar*cM;
    // warmRainyMeltout is a multi-day phenomenon — use 72h max for it
    const warmRainyMeltout=(rawMaxT72+elevCorrC)>5&&r72>15;
    const hasBase=depthM>0.15||s7>15||(seasonSnow>40&&!warmRainyMeltout);
    const rainThenFreeze=r72>3&&curT<-2;
    // overnightHardFreeze: did the overnight refreeze hard enough to lock in morning ice?
    // No max-temp requirement here — a cold cloudy day (max +1°C at valley) can still have
    // a rock-hard icy morning at elevation after a -8°C overnight. The maxT>1 gate only
    // applies to the full daytime melt-refreeze (freezeThaw) used for solar crust.
    const overnightHardFreeze = (Math.min(rawMinT,(rawMinT72??rawMinT))+elevCorrC)<-4;
    // icyMorning fires on overnight hard freeze alone (h<9), no daytime max required
    const icyMorning = overnightHardFreeze && h < 9;
    // freezeThaw: FULL melt-refreeze cycle — needs both hard freeze AND warm-enough day
    const freezeThaw=maxT>1&&overnightHardFreeze;
    const cornCycle=maxT>=0&&maxT<=5&&minT>=-9&&minT<=-3;
    const cornAsp=['S','SE','SW','E'];
    const cornElig=isCornSeason||(month===1&&cornAsp.includes(zone.aspect));
    // On a proper corn day, suppress solarSoft so Corn Snow fires instead of Wet/Heavy
    // Extend suppression to h<17 so W-facing aspects get their afternoon corn window
    const isCornDay=cornElig&&cornCycle&&solar>0.45&&hasBase&&s24<5;
    const solarSoft=rawSolar>0.55&&curT>-4&&hasBase&&!(isCornDay&&h<17&&curT<=1);
    const activeMelt=curT>1&&hasBase;
    const rainOnSnow=r24>5&&hasBase;
    // ① Crusty/Ice: morning refreeze (no warmth needed) OR solar-driven daytime crust.
    // At h<9, overnight hard freeze creates icy surface independent of daytime high —
    // N/NW/NE faces have near-zero solar at 7-8am so the solar>0.25 gate must not apply.
    const crustyTimeOk = h < 10 || (!solarSoft && curT < -1);
    if((rainThenFreeze&&s24<3)||(s24<8&&(icyMorning||(freezeThaw&&solar>0.25&&crustyTimeOk))))
                                                                return{q:'Crusty/Ice',   c:'#546E7A',e:'🧊'};
    // ② Wet/Heavy — activeMelt, rain on snow, or solar softening
    if(activeMelt||rainOnSnow||solarSoft)                       return{q:'Wet/Heavy',    c:'#C62828',e:'💦'};
    if(wind>40&&s72>8)                                          return{q:'Wind Slab',    c:'#B71C1C',e:'⚠️'};
    if(s24>10&&curT<-8&&r72<0.5)                                return{q:'Blower Powder',c:'#0D47A1',e:'❄️'};
    if((s24>8||s72>20)&&curT<-3&&r72<1&&maxT<0)                return{q:'Powder',       c:'#1565C0',e:'❄️'};
    if(cornElig&&cornCycle&&solar>0.45&&hasBase&&s24<5)         return{q:'Corn Snow',    c:'#F9A825',e:'🌽'};
    if(freezeThaw&&solar>0.4&&hasBase)                          return{q:'Solar Crust',  c:'#E65100',e:'🌞'};
    // ⑦ Persistent Crusty/Ice: if overnight froze hard and no new snow has covered the
    // crust, the surface stays icy all day — regardless of hour. activeMelt and solarSoft
    // would have returned Wet/Heavy above if they'd fired, so reaching here means neither
    // happened. Without new snow (s24<5) there's nothing to transform the crust.
    if(overnightHardFreeze&&s24<5)                              return{q:'Crusty/Ice',   c:'#546E7A',e:'🧊'};
    // ⑧ Settled Powder — s7 > 4 OR seasonalBase; allow up to activeMelt threshold (curT<1)
    // Using curT<1 instead of curT<0 closes the 32-34°F gap where shaded NW/N terrain
    // stays settled-powder quality even though air temp ticks slightly above freezing.
    const seasonalBase=seasonSnow>50&&!warmRainyMeltout;
    if((s7>4||seasonalBase)&&curT<1&&r72<3)                     return{q:'Settled Powder',c:'#00897B',e:'🌨️'};
                                                                return{q:'Variable/Thin',c:'#37474F',e:'❓'};
}

function getDayTimeline(nd, zone) {
    const S=7, E=17;  // 7am–5pm ski day
    const LAPSE_F=1.5,ELEV_BASE=1500;
    const elevCorrC=(zone.elev??0)>ELEV_BASE ? -((zone.elev-ELEV_BASE)/1000)*(LAPSE_F/1.8) : 0;
    const rawMin=nd.minTempToday??nd.minTempC_72h, rawMax=nd.maxTempToday??nd.maxTempC_72h;
    const minT=rawMin+elevCorrC, maxT=rawMax+elevCorrC;
    const avg=(maxT+minT)/2, amp=(maxT-minT)/2;
    const tempAt=h=>avg+amp*Math.cos(2*Math.PI*(h-14)/24);
    const blocks=[], classify=zone.type==='resort'?classifyResortAtHour:classifyBCAtHour;
    let cur=null;
    for(let h=S;h<=E;h++){
        const cond=classify(nd,zone,h,tempAt(h));
        if(cur&&cur.q===cond.q){ cur.endH=h+1; }
        else{ if(cur)blocks.push(cur); cur={...cond,startH:h,endH:h+1}; }
    }
    if(cur)blocks.push(cur);
    return{blocks,startH:S,endH:E+1};
}

function renderDayArc(nd, zone, showNow=true) {
    const {blocks,startH,endH}=getDayTimeline(nd,zone);
    const total=endH-startH;
    const nowH = showNow ? new Date().getHours()+new Date().getMinutes()/60 : -1;
    const fh=h=>`${h%12||12}${h>=12?'pm':'am'}`;

    const bHtml=blocks.map(b=>{
        const w=((b.endH-b.startH)/total*100).toFixed(1);
        const narrow=(b.endH-b.startH)<2;
        return `<div class="da-block" style="width:${w}%;background:${b.c}70"
            title="${b.q} · ${fh(b.startH)}–${fh(b.endH)}">
            <span class="da-emoji">${b.e}</span>
            ${narrow?'':` <span class="da-label">${b.q}</span>`}
        </div>`;
    }).join('');

    const nowPct=((nowH-startH)/total*100).toFixed(1);
    const showNowLine=showNow&&nowH>=startH&&nowH<=endH;
    const nowLine=showNowLine
        ?`<div style="position:absolute;left:${nowPct}%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.88);z-index:5;pointer-events:none"></div>`:'';

    // Time ticks: start of each block + end of day, filtered to avoid crowding
    const rawTicks=[...blocks.map(b=>b.startH),endH];
    const ticks=rawTicks.filter((h,i,a)=>i===0||((h-a[i-1])/total*100)>=13);
    const ticksHtml=ticks.map(h=>{
        const pct=((h-startH)/total*100).toFixed(1);
        return `<span class="da-tick" style="left:${pct}%">${fh(h)}</span>`;
    }).join('');
    const nowTick=showNowLine
        ?`<span class="da-tick" style="left:${nowPct}%;color:rgba(255,255,255,.85);font-weight:700;font-size:.5rem;margin-top:-1px">▼</span>`:'';

    const isTmr = nd.isForecast;
    const arcLabel = isTmr ? '🌅 Tomorrow\'s Snow Arc' : '📅 Today\'s Snow Arc';

    return `<div class="day-arc">
        <div class="da-header">
            <span>${arcLabel}</span>
            <span class="da-aspect-label">${zone.aspect}-facing · ${zone.name.split(' ').slice(0,2).join(' ')}</span>
        </div>
        <div class="da-track">${bHtml}${nowLine}</div>
        <div class="da-time-row">${ticksHtml}${nowTick}</div>
    </div>`;
}

// RENDER ZONE DETAIL

function renderDetail(id) {
    // Delegate to tomorrow panel when tomorrow tab is active
    if (activeTab === 'tomorrow') return renderTomorrowDetail(id);

    const z = ZONES.find(z=>z.id===id) || probeZones.find(p=>p.id===id);
    const c=cache[id], el=document.getElementById('zoneDetail');
    if(!z) return;

    if(!c){
        el.innerHTML=`<div class="zdh"><h2>${z.name}</h2><div class="loading-row"><div class="spinner"></div>Loading…</div></div>`;
        return;
    }

    // Zone failed to load — show a friendly retry prompt
    if(c.error || !c.nd){
        el.innerHTML=`<div class="zdh">
            <h2>${z.name}</h2>
            <div class="qbadge a-warning" style="margin-top:.5rem">
                <span class="emoji">⚠️</span>
                <div><div class="qname">Data unavailable</div>
                <div style="font-size:.75rem;font-weight:400;margin-top:.2rem">Error: <code style="font-size:.72rem;background:rgba(0,0,0,.3);padding:1px 5px;border-radius:3px">${c.error||'unknown'}</code></div></div>
            </div>
            <button class="btn" style="margin-top:.75rem;width:100%" onclick="loadAllZones(true)">↻ Try Again</button>
        </div>`;
        return;
    }

    const nd=c.nd, q=c.quality, aqs=c.aspectQualities;
    const fahr=c=>(c*9/5+32).toFixed(0), inch=cm=>(cm/2.54).toFixed(1);
    const depIn=(nd.snowDepthM*39.37).toFixed(0);
    const stars=Math.round(q.rating/2);
    const starStr='★'.repeat(Math.min(stars,5))+'☆'.repeat(Math.max(0,5-stars));

    // Source tag
    const srcHtml = `<div class="source-tag"><span class="sdot" style="background:var(--dim)"></span>🌐 Open-Meteo · Full-season history (Oct 1) + 3-day forecast</div>`;

    // Aspect breakdown grid (2 columns, ordered N→NW)
    const aspGrid=ASPECTS.map(asp=>{
        const aq=aqs[asp], isPrim=asp===z.aspect;
        return `<div class="asp-cell ${isPrim?'primary':''}" id="asp-cell-${z.id}-${asp}" style="border-left-color:${aq.color}" onclick="selectAspect('${z.id}','${asp}')">
            <span class="asp-dir">${asp}</span>
            <span class="asp-emoji">${aq.emoji}</span>
            <span class="asp-qname">${aq.quality}</span>
        </div>`;
    }).join('');

    // Canopy display helpers
    const canopyLabel  = {conifer:'Conifer (Spruce-Fir)', mixed:'Mixed Forest', deciduous:'Deciduous', open:'Open / Above Treeline'}[z.canopy ?? 'open'];
    const canopyEmoji  = {conifer:'🌲', mixed:'🌲🍂', deciduous:'🍂', open:'🏔️'}[z.canopy ?? 'open'];
    const month_now    = new Date().getMonth();
    const isWinterNow  = month_now <= 1 || month_now >= 10;
    const shadeBlocks  = {
        conifer:   55,
        mixed:     isWinterNow ? 35 : 50,
        deciduous: isWinterNow ? 15 : 55,
        open:      0
    }[z.canopy ?? 'open'];
    const canopyNote = z.canopy === 'conifer'
        ? 'Dense evergreen canopy blocks ~55% solar — powder preservation excellent year-round.'
        : z.canopy === 'mixed'
            ? (isWinterNow
                ? 'Hardwoods currently bare. Reduced winter canopy — moderate solar exposure.'
                : 'Full mixed canopy in leaf — moderate solar shading.')
            : z.canopy === 'deciduous'
                ? (isWinterNow
                    ? 'Deciduous trees currently bare — minimal canopy protection this time of year.'
                    : 'Full leaf canopy in summer/fall — good solar shading.')
                : 'No tree canopy — fully exposed to sun, wind, and temperature extremes.';

    el.innerHTML=`
        <div class="zdh">
            <h2>${z.name}</h2>
            <div class="zone-meta">
                <span>🏔️ ${z.elev.toLocaleString()} ft</span>

// Quality rating for "best arc block" selection
const Q_RATING = {
    'Blower Powder':10,'Powder':9,'Spring Corn':8,'Corn Snow':8,
    'Settled Powder':7,'Prime Grooming':6,'Good Conditions':5,
    'Wind Slab':4,'Solar Crust':3,'Wet/Heavy':3,'Wet/Slushy':3,
    'Crusty/Ice':2,'Icy/Hard Pack':2,'Variable/Thin':1,'Variable':1
};

// Return the highest-rated block from a day arc
function getBestFromArc(blocks) {
    if (!blocks.length) return null;
    return blocks.reduce((b, x) => (Q_RATING[x.q] ?? 0) > (Q_RATING[b.q] ?? 0) ? x : b, blocks[0]);
}

// ════════════════════════════════════════════════════════════
// OVERNIGHT REFREEZE MODEL
// Models the sunset→sunrise temperature curve and computes cumulative
// cold exposure (degree-hours below 0°C) as a proxy for ice formation.
// ════════════════════════════════════════════════════════════
function getOvernightRefreeze(nd, zone) {
    const LAPSE_F=1.5, ELEV_BASE=1500;
    const elevCorrC=(zone.elev??0)>ELEV_BASE ? -((zone.elev-ELEV_BASE)/1000)*(LAPSE_F/1.8) : 0;

    // Approximate sunset/sunrise by month at VT latitude (~43.5°N) — used for display label
    const month = new Date().getMonth();
    const sunsetH  = [16.3,16.7,17.5,19.5,20.2,20.5,20.3,19.5,18.5,17.5,16.7,16.2][month];
    const sunriseH = [ 7.2, 6.7, 6.0, 5.4, 4.9, 4.8, 5.0, 5.5, 6.1, 6.7, 7.1, 7.3][month];
    const overnightHrs = (24 - sunsetH) + sunriseH; // e.g. Feb ≈ 13.2h

    let degreeColdHrs = 0;
    let overnightMinC;

    if (nd.tonightTemps && nd.tonightTemps.length >= 8) {
        // ── Hourly path: actual forecast temps for tonight's 5pm→7am window ──────────
        // Each value = 1 hour; elevation-corrected. This is far more accurate than
        // the cosine approximation, which could use tomorrow night's daily minimum.
        const temps = nd.tonightTemps.map(t => t + elevCorrC);
        overnightMinC = Math.min(...temps);
        for (const temp of temps) {
            if (temp < 0) degreeColdHrs += -temp; // 1 hr × |temp °C below zero|
        }
    } else {
        // ── Fallback: cosine approximation (used when hourlyBatch unavailable) ───────
        // Uses today's evening temp decaying to tomorrow's daily min over the overnight window.
        // Note: minTempTomorrow is a daily minimum and can occur late tomorrow night rather
        // than pre-dawn — the hourly path above avoids this ambiguity when data is available.
        const eveningT    = (nd.currentTempC ?? 0) + elevCorrC;
        overnightMinC     = (nd.minTempTomorrow ?? nd.minTempToday ?? nd.currentTempC ?? 0) + elevCorrC;
        const STEPS = Math.round(overnightHrs * 6); // 10-min resolution
        for (let i = 0; i <= STEPS; i++) {
            const t    = (i / STEPS) * overnightHrs;
            const x    = Math.cos(Math.PI * t / overnightHrs);
            const temp = overnightMinC + (eveningT - overnightMinC) * x * x;
            if (temp < 0) degreeColdHrs += (-temp) * (overnightHrs / STEPS);
        }
    }

    // Classify refreeze intensity.
    // Thresholds calibrated for actual hourly step data (1 hr each):
    //   min~0°C  → ~0–5 deg·C·hrs  (trace)
    //   min~-3°C → ~5–20           (light)
    //   min~-7°C → ~20–50          (moderate)
    //   min<-10°C→ ~60+            (hard)
    let level, label, color, icon;
    if (overnightMinC >= 0) {
        level='none';     icon='💧'; color='#C62828';
        label=`Surface stays above freezing all night (low ${fahr_n(overnightMinC)}°F) — no refreeze`;
    } else if (degreeColdHrs < 5) {
        level='trace';    icon='🌡️'; color='#78909C';
        label=`Brief dip below freezing (${fahr_n(overnightMinC)}°F low, ${degreeColdHrs.toFixed(0)}°C·hrs) — light surface hardening only`;
    } else if (degreeColdHrs < 25) {
        level='light';    icon='❄️'; color='#4FC3F7';
        label=`Light overnight freeze (${fahr_n(overnightMinC)}°F low, ${degreeColdHrs.toFixed(0)}°C·hrs) — firm crust by morning, softens quickly in sun`;
    } else if (degreeColdHrs < 60) {
        level='moderate'; icon='🧊'; color='#1976D2';
        label=`Solid overnight refreeze (${fahr_n(overnightMinC)}°F low, ${degreeColdHrs.toFixed(0)}°C·hrs) — icy surface at 7am, prime corn window later`;
    } else {
        level='hard';     icon='🥶'; color='#0D47A1';
        label=`Hard overnight freeze (${fahr_n(overnightMinC)}°F low, ${degreeColdHrs.toFixed(0)}°C·hrs) — boilerplate until well into morning`;
    }

    return { level, icon, color, label, overnightMinC, degreeColdHrs, overnightHrs };
}

// Small helper: ˚C → ˚F formatted (used only inside the overnight module)
function fahr_n(c) { return (c * 9/5 + 32).toFixed(0); }

// Build a synthetic nd for tomorrow's forecast classification
function buildTomorrowNd(nd) {
    const tmaxRaw = nd.maxTempTomorrow ?? nd.maxTempToday;
    // nd.minTempTomorrow is the DAILY minimum for tomorrow, which can occur late in the
    // evening (e.g., cold front arrives at 10pm) rather than pre-dawn. This causes
    // tomorrow's diurnal arc to show falsely frigid morning temps and spurious Crusty/Ice.
    // When tonightTemps is available (hourly API), use the actual overnight minimum
    // (min of 5pm today → 7am tomorrow) which is the true pre-dawn low for tomorrow morning.
    const tminRaw = nd.tonightTemps?.length >= 8
        ? Math.min(...nd.tonightTemps)
        : (nd.minTempTomorrow ?? nd.minTempToday);
    const s24t    = nd.snowTomorrow_cm  ?? 0;
    const r24t    = nd.rainTomorrow_mm  ?? 0;
    const windT   = nd.windTomorrow_kmh ?? nd.maxWind24h_kmh;
    return {
        ...nd,
        // Rough midday temp for instantaneous classify calls
        currentTempC:    (tmaxRaw + tminRaw) / 2,
        // 72h window: keep the broader range (today's 72h already includes yesterday)
        maxTempC_72h:    Math.max(nd.maxTempC_72h ?? tmaxRaw, tmaxRaw),
        minTempC_72h:    Math.min(nd.minTempC_72h ?? tminRaw, tminRaw),
        // Tomorrow becomes "today" for the diurnal arc curve
        maxTempToday:    tmaxRaw,
        minTempToday:    tminRaw,
        // Day-after-tomorrow becomes the new "tomorrow" for any look-ahead predictions
        maxTempTomorrow: nd.maxTempDay2 ?? null,
        minTempTomorrow: nd.minTempDay2 ?? null,
        // Fresh snow forecast for tomorrow
        snow24h_cm:      s24t,
        // Rolling 72h window: keep today's 72h history + tomorrow's expected snow.
        // Using nd.snow24h_cm (2-day window) was too narrow — it dropped multi-day storm history.
        snow72h_cm:      (nd.snow72h_cm ?? 0) + s24t,
        snow7d_cm:       (nd.snow7d_cm  ?? 0) + s24t,
        rain24h_mm:      r24t,
        rain72h_mm:      (nd.rain72h_mm ?? 0) + r24t,
        maxWind24h_kmh:  windT,
        isForecast:      true
    };
}

// "Prime Picks" banner — scan all zones for tomorrow's best conditions
function renderTomorrowPicksBanner() {
    const cornZones=[], powderZones=[], groomZones=[];
    ZONES.forEach(z => {
        const c = cache[z.id];
        if (!c?.nd?.maxTempTomorrow) return;
        const tnd = buildTomorrowNd(c.nd);
        const {blocks} = getDayTimeline(tnd, z);
        const best = getBestFromArc(blocks);
        if (!best) return;
        if (best.q==='Corn Snow'||best.q==='Spring Corn')          cornZones.push(z.name);
        else if (best.q==='Blower Powder'||best.q==='Powder')      powderZones.push(z.name);
        else if (best.q==='Prime Grooming')                         groomZones.push(z.name);
    });
    const rows=[];
    if (cornZones.length)   rows.push(`<div class="pick-row"><span class="pick-icon">🌽</span><div><div class="pick-zones">${cornZones.join(', ')}</div><div class="pick-label">Prime corn expected</div></div></div>`);
    if (powderZones.length) rows.push(`<div class="pick-row"><span class="pick-icon">❄️</span><div><div class="pick-zones">${powderZones.join(', ')}</div><div class="pick-label">Fresh powder forecast</div></div></div>`);
    if (groomZones.length)  rows.push(`<div class="pick-row"><span class="pick-icon">⭐</span><div><div class="pick-zones">${groomZones.join(', ')}</div><div class="pick-label">Prime grooming expected</div></div></div>`);
    const content = rows.length
        ? rows.join('')
        : `<div class="no-picks">No outstanding conditions predicted for tomorrow</div>`;
    return `<div class="picks-banner"><div class="picks-title">Tomorrow's Prime Picks</div>${content}</div>`;
}
