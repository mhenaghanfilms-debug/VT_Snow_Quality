<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VT Backcountry Snow Quality</title>
    <!-- Preconnect: browser opens TCP+TLS to these hosts immediately, before any JS runs -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://api.open-meteo.com" crossorigin>
    <link rel="preconnect" href="https://archive-api.open-meteo.com" crossorigin>
    <link rel="preconnect" href="https://basemap.nationalmap.gov" crossorigin>
    <link rel="preconnect" href="https://s3.amazonaws.com" crossorigin>
    <link rel="dns-prefetch" href="https://basemap.nationalmap.gov">
    <link rel="dns-prefetch" href="https://api.open-meteo.com">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <!-- MapLibre GL JS: WebGL 3D map with terrain, tilt, rotation -->
    <script async src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
            onload="window._mapLibReady=true; if(window._domReady) _tryInitMap();"
            onerror="console.warn('MapLibre CDN failed — map unavailable')"></script>
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"
            onload="window._suncalcReady=true;"
            onerror="console.warn('SunCalc CDN failed — sun tracking unavailable')"></script>
    <style>
        :root {
            --bg:      #0d1b2a;
            --surface: #1b2d42;
            --s2:      #243647;
            --border:  #2d4159;
            --text:    #e0eff7;
            --dim:     #6b93b0;
            --accent:  #4fc3f7;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:var(--bg); color:var(--text);
            font-family:'Segoe UI',system-ui,sans-serif;
            height:100vh; display:flex; flex-direction:column; overflow:hidden;
        }

        /* ── HEADER ──────────────────────────────────────────── */
        header {
            background:var(--surface); border-bottom:1px solid var(--border);
            height:54px; padding:0 16px; display:flex; align-items:center;
            gap:12px; flex-shrink:0; z-index:1000;
        }
        .logo { font-size:1.5rem; }
        .hd-title h1 { font-size:1.03rem; font-weight:700; color:var(--accent); }
        .hd-title p  { font-size:.67rem; color:var(--dim); }
        .hd-right { margin-left:auto; display:flex; align-items:center; gap:9px; }
        #lastUpdated { font-size:.7rem; color:var(--dim); white-space:nowrap; }
        .btn {
            background:var(--s2); border:1px solid var(--border); color:var(--text);
            padding:5px 10px; border-radius:5px; cursor:pointer; font-size:.75rem;
            transition:background .15s; white-space:nowrap;
        }
        .btn:hover { background:var(--border); }
        .btn.active { background:var(--accent); color:#0d1b2a; border-color:var(--accent); }
        .avy-btn { background:rgba(183,28,28,.22); border:1px solid rgba(239,83,80,.35); color:#ef9a9a; text-decoration:none; }
        .avy-btn:hover { background:rgba(183,28,28,.38); }

        /* ── LAYOUT ──────────────────────────────────────────── */
        .main { display:flex; flex:1; overflow:hidden; }
        #mapWrap { flex:1; z-index:1; position:relative; overflow:hidden; }
        #map  { width:100%; height:100%; }

        /* ── SIDEBAR ─────────────────────────────────────────── */
        .sidebar {
            width:520px; background:var(--surface);
            border-left:1px solid var(--border);
            display:flex; flex-direction:column; overflow:hidden;
        }
        .zone-detail { flex-shrink:0; max-height:70%; overflow-y:auto; }

        .zone-placeholder { padding:28px 18px; text-align:center; color:var(--dim); }
        .zone-placeholder .icon { font-size:2.2rem; margin-bottom:8px; }
        .zone-placeholder p { font-size:.8rem; line-height:1.65; }

        /* Detail header */
        .zdh { padding:12px 14px; background:var(--s2); border-bottom:1px solid var(--border); }
        .zdh h2 { font-size:1rem; font-weight:700; margin-bottom:3px; }
        .zone-meta { display:flex; gap:10px; font-size:.7rem; color:var(--dim); margin-bottom:9px; flex-wrap:wrap; }

        /* Primary quality badge */
        .qbadge {
            display:flex; align-items:center; gap:9px;
            padding:8px 12px; border-radius:7px; margin-bottom:6px;
            border:1px solid transparent;
        }
        .qbadge .emoji { font-size:1.4rem; }
        .qbadge .qname { font-size:.93rem; font-weight:700; }
        .qbadge .stars { font-size:.63rem; color:gold; letter-spacing:.5px; }
        .qreason { font-size:.74rem; color:var(--dim); line-height:1.55; }

        .a-excellent{ background:rgba(13,71,161,.2);  border-color:rgba(66,165,245,.3);  color:#90CAF9; }
        .a-good     { background:rgba(106,27,154,.2); border-color:rgba(186,104,200,.3); color:#CE93D8; }
        .a-fair     { background:rgba(69,90,100,.2);  border-color:rgba(144,164,174,.25);color:#B0BEC5; }
        .a-warning  { background:rgba(230,81,0,.2);   border-color:rgba(255,171,64,.3);  color:#FFAB64; }
        .a-danger   { background:rgba(183,28,28,.2);  border-color:rgba(239,83,80,.3);   color:#EF9A9A; }
        .a-unknown  { background:rgba(55,71,79,.2);   border-color:rgba(84,110,122,.25); color:#90A4AE; }

        /* ── ASPECT ROSE ─────────────────────────────────────── */
        .rose-wrap {
            padding:10px 14px 6px;
            border-bottom:1px solid var(--border);
            display:flex; flex-direction:column; align-items:center; gap:6px;
        }
        .rose-title { font-size:.62rem; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; align-self:flex-start; }
        .rose-row { display:flex; align-items:center; gap:14px; width:100%; }
        .rose-svg-wrap { flex-shrink:0; }
        .rose-legend { flex:1; }

        /* Aspect quality grid — 8 rows, 2 cols */
        .asp-grid {
            display:grid; grid-template-columns:1fr 1fr;
            gap:3px;
        }
        .asp-cell {
            display:flex; align-items:center; gap:5px;
            padding:3px 6px; border-radius:4px;
            border-left:3px solid transparent;
            background:rgba(255,255,255,.03);
            font-size:.68rem;
            cursor:pointer; transition:background .12s;
        }
        .asp-cell:hover { background:rgba(255,255,255,.09); }
        .asp-cell.primary {
            background:rgba(255,255,255,.08);
            outline:1px solid rgba(255,255,255,.12);
        }
        .asp-cell.selected {
            background:rgba(79,195,247,.13);
            outline:1px solid rgba(79,195,247,.35);
        }

        /* ── ASPECT DETAIL CARD (shown on wedge/cell click) ── */
        .aspect-detail {
            display:none;
            padding:10px 14px 12px;
            border-bottom:1px solid var(--border);
            background:rgba(79,195,247,.04);
            border-top:2px solid rgba(79,195,247,.2);
        }
        .ad-header {
            display:flex; align-items:center; gap:6px; margin-bottom:5px;
        }
        .ad-asp-label {
            font-size:.9rem; font-weight:700; color:var(--text);
        }
        .ad-primary-badge {
            background:rgba(79,195,247,.15); color:var(--accent);
            border:1px solid rgba(79,195,247,.3);
            border-radius:10px; padding:1px 7px;
            font-size:.57rem; letter-spacing:.06em; text-transform:uppercase;
        }
        .ad-quality { font-size:.82rem; font-weight:700; margin-bottom:3px; }
        .ad-reason  { font-size:.68rem; color:var(--dim); line-height:1.52; margin-bottom:8px; }
        .ad-ot {
            display:flex; align-items:flex-start; gap:9px;
            padding-top:7px; border-top:1px solid var(--border);
        }
        .ad-ot-icon  { font-size:1.15rem; flex-shrink:0; line-height:1.1; margin-top:1px; }
        .ad-ot-time  { font-size:.85rem; font-weight:700; color:var(--accent); margin-bottom:2px; }
        .ad-ot-detail{ font-size:.67rem; color:var(--dim); line-height:1.5; }
        .asp-dir  { font-weight:700; color:var(--dim); min-width:20px; font-size:.65rem; }
        .asp-emoji { font-size:.82rem; }
        .asp-qname { color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        /* ── METRICS ─────────────────────────────────────────── */
        .metrics {
            display:grid; grid-template-columns:repeat(5,1fr);
            gap:1px; background:var(--border); border-top:1px solid var(--border);
        }
        .metric { background:var(--surface); padding:7px 5px; text-align:center; }
        .mval { font-size:.95rem; font-weight:700; color:var(--accent); }
        .mlbl { font-size:.57rem; color:var(--dim); margin-top:2px; text-transform:uppercase; letter-spacing:.04em; }

        /* Source tag */
        .source-tag {
            padding:5px 14px; font-size:.66rem; color:var(--dim);
            border-bottom:1px solid var(--border); display:flex; align-items:center; gap:5px;
        }
        .sdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

        /* Chart */
        .chart-wrap { padding:8px 12px 10px; border-bottom:1px solid var(--border); }
        .chart-title { font-size:.6rem; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; }
        .chart-box { position:relative; height:130px; }

        /* Zone desc */
        .zdesc { padding:8px 14px; font-size:.71rem; color:var(--dim); line-height:1.55; border-bottom:1px solid var(--border); }

        /* ── ZONE LIST ───────────────────────────────────────── */
        .zone-list { flex:1; overflow-y:auto; min-height:60px; }
        .zl-header {
            padding:7px 14px; font-size:.62rem; color:var(--dim);
            text-transform:uppercase; letter-spacing:.1em;
            background:var(--s2); border-bottom:1px solid var(--border);
            position:sticky; top:0; z-index:5;
        }
        .zitem {
            display:flex; align-items:center; gap:8px; padding:7px 12px;
            border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s;
        }
        .zitem:hover { background:var(--s2); }
        .zitem.active { background:var(--s2); border-left:3px solid var(--accent); padding-left:9px; }
        .zdot  { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.9rem; flex-shrink:0; }
        .zi-info { flex:1; min-width:0; }
        .zi-name { font-size:.79rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .zi-sub  { font-size:.67rem; color:var(--dim); }
        .zi-temp { font-size:.8rem; font-weight:700; color:var(--accent); flex-shrink:0; }
        /* mini rose in list */
        .mini-rose { flex-shrink:0; }

        /* loading */
        .loading-row { display:flex; align-items:center; gap:8px; padding:13px; color:var(--dim); font-size:.75rem; }
        .spinner { width:13px; height:13px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }


        /* ── TIME SLIDER (Leaflet control) ────────────────── */
        .time-control {
            background:rgba(13,27,42,.92); border-radius:8px;
            border:1px solid var(--border); padding:8px 12px;
            min-width:260px; max-width:340px;
            backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
        }
        .tc-row { display:flex; align-items:center; gap:8px; }
        .tc-label { font-size:.65rem; color:var(--dim); text-transform:uppercase; letter-spacing:.04em; }
        .tc-time { font-size:.85rem; font-weight:700; color:#FFD54F; min-width:52px; }
        .tc-slider {
            flex:1; -webkit-appearance:none; appearance:none;
            height:4px; background:var(--border); border-radius:2px; outline:none;
            cursor:pointer;
        }
        .tc-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:16px; height:16px;
            background:#FFD54F; border-radius:50%; border:2px solid var(--bg);
            cursor:grab; box-shadow:0 0 6px rgba(255,213,79,.5);
        }
        .tc-slider::-moz-range-thumb {
            width:14px; height:14px; background:#FFD54F; border-radius:50%;
            border:2px solid var(--bg); cursor:grab;
        }
        .tc-now {
            background:none; border:1px solid var(--border); color:var(--accent);
            font-size:.6rem; padding:2px 6px; border-radius:4px; cursor:pointer;
            font-weight:600; white-space:nowrap;
        }
        .tc-now:hover { background:var(--s2); }
        .tc-sun { font-size:.7rem; color:var(--dim); margin-top:3px; }
        .tc-sun-icon { filter:drop-shadow(0 0 4px rgba(255,213,79,.6)); }

        /* MAPLIBRE overrides */
        .maplibregl-ctrl-group button { background:var(--s2)!important; color:var(--text)!important; border-color:var(--border)!important; }
        .maplibregl-ctrl-group button span { filter:invert(1); }
        .maplibregl-popup-content { background:rgba(13,27,42,.94); border:1px solid var(--border); color:var(--text); font-size:.7rem; font-weight:600; padding:4px 10px; border-radius:5px; }
        .maplibregl-popup-anchor-top .maplibregl-popup-tip { border-bottom-color:rgba(13,27,42,.94); }
        .maplibregl-popup-anchor-bottom .maplibregl-popup-tip { border-top-color:rgba(13,27,42,.94); }
        .maplibregl-popup-close-button { color:var(--dim); font-size:1rem; }
        /* Zone marker dot */
        .zone-dot {
            border-radius:50%; border:2px solid rgba(255,255,255,.7);
            box-shadow:0 2px 6px rgba(0,0,0,.7); cursor:pointer; transition:all .15s;
        }
        .zone-dot.active { border-color:#4fc3f7; }
        /* Map overlay panels */
        .map-overlay { position:absolute; z-index:2; pointer-events:auto; }
        .map-overlay.top-right { top:10px; right:10px; }
        .map-overlay.bottom-left { bottom:30px; left:10px; }
        .map-overlay.bottom-right { bottom:30px; right:10px; }
        /* 3D view hint */
        .view-hint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(13,27,42,.85);
            color:var(--text); font-size:.75rem; padding:8px 14px; border-radius:8px; pointer-events:none; z-index:5;
            opacity:0; transition:opacity .4s; }
        .view-hint.show { opacity:1; }

        /* ── OPTIMAL TIME WIDGET ─────────────────────────── */
        .optimal-time {
            padding:9px 14px 11px; border-bottom:1px solid var(--border);
            background:rgba(79,195,247,.05);
        }
        .ot-header {
            font-size:.58rem; color:var(--dim); text-transform:uppercase;
            letter-spacing:.12em; margin-bottom:6px;
        }
        .ot-card { display:flex; align-items:flex-start; gap:10px; }
        .ot-icon { font-size:1.45rem; flex-shrink:0; line-height:1.1; margin-top:1px; }
        .ot-time {
            font-size:.93rem; font-weight:700; color:var(--accent);
            margin-bottom:2px; line-height:1.2;
        }
        .ot-detail { font-size:.69rem; color:var(--dim); line-height:1.52; }

        /* ── DAY ARC TIMELINE ────────────────────────────────── */
        .day-arc {
            padding:10px 14px 13px; border-bottom:1px solid var(--border);
        }
        .da-header {
            font-size:.57rem; color:var(--dim); text-transform:uppercase;
            letter-spacing:.1em; margin-bottom:7px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .da-aspect-label { color:var(--accent); font-weight:600; }
        .da-track {
            position:relative; height:58px; display:flex;
            border-radius:6px; overflow:hidden;
            border:1px solid rgba(255,255,255,.07);
        }
        .da-block {
            display:flex; flex-direction:column; justify-content:center;
            align-items:center; gap:2px; overflow:hidden;
            position:relative; transition:filter .12s;
            border-right:1px solid rgba(0,0,0,.3); flex-shrink:0;
            cursor:default;
        }
        .da-block:last-child { border-right:none; }
        .da-block:hover { filter:brightness(1.18); }
        .da-emoji { font-size:.95rem; line-height:1; }
        .da-label {
            font-size:.52rem; font-weight:700; white-space:nowrap;
            overflow:hidden; text-overflow:ellipsis;
            padding:0 4px; max-width:100%; text-align:center;
            color:rgba(255,255,255,.93);
        }
        .da-time-row {
            position:relative; height:15px; margin-top:3px;
            font-size:.56rem; color:var(--dim);
        }
        .da-tick {
            position:absolute; transform:translateX(-50%); white-space:nowrap;
        }

        /* ── TABS ────────────────────────────────────────────── */
        .tab-bar {
            display:flex; background:var(--s2);
            border-bottom:1px solid var(--border); flex-shrink:0;
        }
        .tab-btn {
            flex:1; background:none; border:none;
            border-bottom:2px solid transparent;
            color:var(--dim); padding:9px 0;
            font-size:.73rem; font-weight:600; letter-spacing:.03em;
            cursor:pointer; transition:color .15s, border-color .15s;
        }
        .tab-btn:hover { color:var(--text); }
        .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

        /* ── TOMORROW ─────────────────────────────────────────── */
        .tmr-tag {
            display:inline-flex; align-items:center; gap:4px;
            background:rgba(255,152,0,.13); color:#FFB74D;
            border:1px solid rgba(255,152,0,.28); border-radius:10px;
            padding:1px 8px; font-size:.58rem; font-weight:700;
            letter-spacing:.07em; text-transform:uppercase;
            vertical-align:middle; margin-left:5px;
        }
        .picks-banner {
            padding:10px 12px 9px; border-bottom:1px solid var(--border);
            background:rgba(79,195,247,.03);
        }
        .picks-title {
            font-size:.57rem; color:var(--dim); text-transform:uppercase;
            letter-spacing:.1em; margin-bottom:7px;
        }
        .pick-row {
            display:flex; align-items:flex-start; gap:8px;
            margin-bottom:5px; font-size:.72rem;
        }
        .pick-row:last-child { margin-bottom:0; }
        .pick-icon { font-size:.9rem; flex-shrink:0; line-height:1.4; }
        .pick-zones { color:var(--text); line-height:1.4; }
        .pick-label { color:var(--dim); font-size:.67rem; }
        .no-picks { font-size:.74rem; color:var(--dim); text-align:center; padding:4px 0; }
        .tmr-metrics { display:grid; grid-template-columns:repeat(4,1fr); }

        /* ── OVERNIGHT REFREEZE ──────────────────────────────── */
        .overnight-wrap {
            padding:9px 14px 11px; border-bottom:1px solid var(--border);
        }
        .overnight-header {
            font-size:.57rem; color:var(--dim); text-transform:uppercase;
            letter-spacing:.12em; margin-bottom:6px;
        }
        .overnight-card {
            display:flex; align-items:flex-start; gap:10px;
        }
        .overnight-icon { font-size:1.4rem; flex-shrink:0; line-height:1.1; margin-top:1px; }
        .overnight-bar-wrap { flex:1; }
        .overnight-label { font-size:.68rem; color:var(--dim); line-height:1.5; margin-top:4px; }
        .overnight-bar-track {
            height:7px; border-radius:4px; background:var(--border);
            overflow:hidden; margin-bottom:2px;
        }
        .overnight-bar-fill { height:100%; border-radius:4px; transition:width .3s; }

        /* ── TRAIL PICKS ─────────────────────────────────────── */
        .trail-picks {
            border-top:1px solid var(--border);
            padding:10px 14px 4px;
        }
        .trail-picks-hd {
            font-size:.65rem; color:var(--dim); text-transform:uppercase;
            letter-spacing:.1em; margin-bottom:7px;
        }
        .trail-time-btns {
            display:flex; gap:5px; flex-wrap:wrap; margin-bottom:9px;
        }
        .tpick-btn {
            background:var(--s2); border:1px solid var(--border);
            color:var(--dim); padding:3px 9px; border-radius:4px;
            font-size:.68rem; cursor:pointer; transition:all .15s;
        }
        .tpick-btn:hover { color:var(--text); border-color:var(--accent); }
        .tpick-btn.active { background:var(--accent); color:#0d1b2a; border-color:var(--accent); }
        .trail-group { margin-bottom:7px; }
        .tg-hd {
            font-size:.6rem; text-transform:uppercase; letter-spacing:.08em;
            padding:2px 0 4px; margin-bottom:2px;
        }
        .tg-hd.prime { color:#F9A825; }
        .tg-hd.good  { color:#42A5F5; }
        .tg-hd.meh   { color:#78909C; }
        .trail-row {
            display:flex; align-items:center; gap:7px;
            padding:3px 0; border-bottom:1px solid rgba(45,65,89,.4); font-size:.73rem;
        }
        .trail-row:last-child { border-bottom:none; }
        .trail-diff { font-size:.8rem; flex-shrink:0; width:18px; text-align:center; }
        .trail-name { flex:1; font-weight:600; }
        .trail-asp  { font-size:.63rem; color:var(--dim); width:22px; }
        .trail-q    { font-size:.68rem; font-weight:600; }

        /* Map legend */
        .map-legend {
            background:rgba(13,27,42,.9); border:1px solid var(--border);
            padding:8px 10px; border-radius:5px; font-size:.64rem; color:var(--dim); line-height:1.9;
        }
        .map-legend strong { color:var(--text); display:block; margin-bottom:1px; font-size:.65rem; }
        .leg-row { display:flex; align-items:center; gap:5px; }
        .leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

        /* ── Desktop: hide mobile-only elements ── */
        .sheet-handle { display:none; }
        .zone-cards-strip { display:none; }
        #legendToggle { display:none; }

        /* ── MOBILE RESPONSIVE ───────────────────────────────── */
        @media (max-width: 768px) {

            /* Header: condense */
            header { height:44px; padding:0 10px; gap:7px; }
            .logo { font-size:1.15rem; }
            .hd-title h1 { font-size:.78rem; }
            .hd-title p  { display:none; }
            #lastUpdated { display:none; }
            .hd-right { gap:5px; }
            .btn { padding:4px 7px; font-size:.68rem; }

            /* ── Map fills available space above bottom sheet ── */
            body { overflow:hidden; }

<script>
// ════════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════════
const ASPECTS    = ['N','NE','E','SE','S','SW','W','NW'];
const ASP_DEG    = {N:0,NE:45,E:90,SE:135,S:180,SW:225,W:270,NW:315};

// canopy: 'conifer' | 'deciduous' | 'mixed' | 'open'
// Winter solar shade: conifer ~55%, mixed ~35%, deciduous ~15%, open 0%
// Above ~2800ft in VT: boreal spruce-fir (conifer); below: mixed hardwood-conifer transition
const ZONES = [

    },
    {

        desc:'SE-facing "sun mountain". Mixed forest canopy means solar exposure is significant. Best for spring corn; avoid for powder preservation.'
    },
    {

        desc:'Lower-elevation town forest near Mount Snow. Mixed hardwood-conifer — deciduous trees currently bare in winter, reducing canopy protection.'
    },
    {

        desc:'North-facing terrain in the Mount Snow corridor. High elevation boreal conifers provide good snow protection.'
    },
    {
        id:'mtsnow', name:'Mount Snow Resort', lat:42.959, lon:-72.924, elev:3583, aspect:'S', canopy:'open', type:'resort',
        desc:'Summit ridge at 3,583ft with predominantly south-facing resort terrain. Main trails and Front Four glades face south — strong solar exposure makes this a prime spring corn mountain.'
    }
];


// ════════════════════════════════════════════════════════════
// TIME HELPERS
// ════════════════════════════════════════════════════════════
function getNowNY() {
    return new Intl.DateTimeFormat('sv-SE',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date()).replace(' ','T');
}
function getTodayNY() { return getNowNY().slice(0,10); } // "YYYY-MM-DD"

// ════════════════════════════════════════════════════════════
// GEOGRAPHY — offset a lat/lon by distance + bearing
// ════════════════════════════════════════════════════════════
function offsetLatLon(lat, lon, distM, bearingDeg) {
    const R=6371000, d=distM/R, b=bearingDeg*Math.PI/180;
    const φ1=lat*Math.PI/180, λ1=lon*Math.PI/180;
    const φ2=Math.asin(Math.sin(φ1)*Math.cos(d)+Math.cos(φ1)*Math.sin(d)*Math.cos(b));
    const λ2=λ1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(φ1),Math.cos(d)-Math.sin(φ1)*Math.sin(φ2));
    return [φ2*180/Math.PI, λ2*180/Math.PI];
}

// Build wedge polygon (pie-slice) for one compass direction
function wedgePoly(lat, lon, bearingDeg, radiusM) {
    const pts=[[lat,lon]];
    for(let i=0;i<=10;i++) pts.push(offsetLatLon(lat,lon,radiusM,(bearingDeg-22.5)+(i/10)*45));
    pts.push([lat,lon]);
    return pts;
}

// ════════════════════════════════════════════════════════════
// TERRAIN ASPECT ANALYSIS (DEM-based)
//
// Fetches real elevation data from Terrarium tiles (the same
// source MapLibre uses for 3D terrain), then computes slope
// aspect at each grid cell using Horn's gradient method.
// This replaces geometric pie-wedges with terrain-aware
// polygons that follow the actual slope face directions.
// ════════════════════════════════════════════════════════════
const demTileCache = {};       // 'z/x/y' → Float32Array(65536)
const zoneAspectGrids = {};    // zoneId → { cells: [{dir,slope,ring}, ...] }
const DEM_ZOOM = 12;           // ~28m/pixel resolution

function latLonToTile(lat, lon, zoom) {
    const n = 1 << zoom;
    const x = Math.floor((lon + 180) / 360 * n);
    const latRad = lat * Math.PI / 180;
    const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
    return { x: Math.max(0, Math.min(n - 1, x)), y: Math.max(0, Math.min(n - 1, y)) };
}

function tileBoundsLL(tx, ty, zoom) {
    const n = 1 << zoom;
    return {
        west:  tx / n * 360 - 180,
        east:  (tx + 1) / n * 360 - 180,
        north: Math.atan(Math.sinh(Math.PI * (1 - 2 * ty / n))) * 180 / Math.PI,
        south: Math.atan(Math.sinh(Math.PI * (1 - 2 * (ty + 1) / n))) * 180 / Math.PI
    };
}

function fetchTerrainTile(tx, ty, zoom) {
    const key = `${zoom}/${tx}/${ty}`;
    if (demTileCache[key]) return Promise.resolve(demTileCache[key]);
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            const cv = document.createElement('canvas');
            cv.width = cv.height = 256;
            const ctx = cv.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const d = ctx.getImageData(0, 0, 256, 256).data;
            const elev = new Float32Array(65536);
            for (let i = 0; i < 65536; i++) elev[i] = d[i * 4] * 256 + d[i * 4 + 1] + d[i * 4 + 2] / 256 - 32768;
            demTileCache[key] = elev;
            resolve(elev);
        };
        img.onerror = () => reject(new Error('DEM tile failed'));
        img.src = `https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${zoom}/${tx}/${ty}.png`;
    });
}

function aspectDegToDir(deg) {
    if (deg >= 337.5 || deg < 22.5) return 'N';
    if (deg < 67.5)  return 'NE';
    if (deg < 112.5) return 'E';
    if (deg < 157.5) return 'SE';
    if (deg < 202.5) return 'S';
    if (deg < 247.5) return 'SW';
    if (deg < 292.5) return 'W';
    return 'NW';
}

// Compute aspect grid for a point using Horn's method on DEM data.
// Fetches ALL tiles covered by the wedge radius (handles tile boundaries).
async function computeAspectGrid(centerLat, centerLon, radius) {
    const latM = 111320, lonM = 111320 * Math.cos(centerLat * Math.PI / 180);
    const latSpan = radius / latM, lonSpan = radius / lonM;

    // Determine which tiles are needed (may be 1–4 tiles)
    const corners = [
        [centerLat + latSpan, centerLon - lonSpan],
        [centerLat + latSpan, centerLon + lonSpan],
        [centerLat - latSpan, centerLon - lonSpan],
        [centerLat - latSpan, centerLon + lonSpan]
    ];
    const tileSet = new Set();
    corners.forEach(([lt, ln]) => {
        const t = latLonToTile(lt, ln, DEM_ZOOM);
        tileSet.add(`${t.x},${t.y}`);
    });

    // Fetch all required tiles in parallel
    const tileEntries = [];
    const promises = [];
    tileSet.forEach(key => {
        const [tx, ty] = key.split(',').map(Number);
        promises.push(
            fetchTerrainTile(tx, ty, DEM_ZOOM)
                .then(elev => tileEntries.push({ tx, ty, elev, bounds: tileBoundsLL(tx, ty, DEM_ZOOM) }))
                .catch(() => {})
        );
    });
    await Promise.all(promises);
    if (tileEntries.length === 0) return [];

    const cells = [];
    tileEntries.forEach(({ tx, ty, elev, bounds: b }) => {
        const cLatD = (b.north - b.south) / 256;
        const cLonD = (b.east - b.west) / 256;
        const csM = ((cLatD * latM) + (cLonD * lonM)) / 2;
        const hL = cLatD / 2, hN = cLonD / 2;

        for (let py = 2; py < 254; py++) {
            for (let px = 2; px < 254; px++) {
                const lat = b.north - (py + 0.5) / 256 * (b.north - b.south);
                const lon = b.west + (px + 0.5) / 256 * (b.east - b.west);
                const dlat = (lat - centerLat) * latM, dlon = (lon - centerLon) * lonM;
                const dist = Math.sqrt(dlat * dlat + dlon * dlon);
                if (dist > radius) continue;

                const i = py * 256 + px;
                const dzdx = ((elev[(py-1)*256+(px+1)] + 2*elev[i+1] + elev[(py+1)*256+(px+1)]) -
                              (elev[(py-1)*256+(px-1)] + 2*elev[i-1] + elev[(py+1)*256+(px-1)])) / (8*csM);
                const dzdy = ((elev[(py+1)*256+(px-1)] + 2*elev[(py+1)*256+px] + elev[(py+1)*256+(px+1)]) -
                              (elev[(py-1)*256+(px-1)] + 2*elev[(py-1)*256+px] + elev[(py-1)*256+(px+1)])) / (8*csM);

                const slope = Math.atan(Math.sqrt(dzdx*dzdx + dzdy*dzdy)) * 180 / Math.PI;
                if (slope < 3) continue;

                let asp = Math.atan2(dzdy, -dzdx) * 180 / Math.PI;
                if (asp < 0) asp += 360;

                cells.push({
                    dir: aspectDegToDir(asp), slope,
                    ring: [[lon-hN,lat+hL],[lon+hN,lat+hL],[lon+hN,lat-hL],[lon-hN,lat-hL],[lon-hN,lat+hL]]
                });
            }
        }
    });
    return cells;
}

// Wrapper for named zones (checks cache, stores result)
async function ensureDEMForZone(zoneId) {
    if (zoneAspectGrids[zoneId]) return;
    const z = ZONES.find(zn => zn.id === zoneId);
    if (!z) return;
    const cells = await computeAspectGrid(z.lat, z.lon, WEDGE_RADIUS);
    zoneAspectGrids[zoneId] = { cells };
}

// Pre-fetch DEM for all zones in parallel (called after map loads)
function preloadAllDEM() {
    ZONES.forEach(z => {
        ensureDEMForZone(z.id).then(() => {
            // Once DEM is ready, refresh the wedge layer to show terrain-aware polygons
            if (map && map.getSource('wedges')) {
                map.getSource('wedges').setData(buildWedgeGeoJSON(timeOverride));
            }
        }).catch(() => {});
    });
}

// ════════════════════════════════════════════════════════════
// TERRAIN PROBE — click anywhere in VT to analyze conditions
// ════════════════════════════════════════════════════════════

// Vermont bounding box (rough)
const VT_BOUNDS = { north: 45.02, south: 42.72, west: -73.44, east: -71.50 };
let probePopup = null;       // current MapLibre popup
let probeMarker = null;      // current probe pin

function isInVermont(lat, lon) {
    return lat >= VT_BOUNDS.south && lat <= VT_BOUNDS.north &&
           lon >= VT_BOUNDS.west  && lon <= VT_BOUNDS.east;
}

// Analyze DEM at a single point: returns { elevation (ft), aspect ('N','SE',...), slope (deg) } or null
async function probeDEM(lat, lon) {
    const tile = latLonToTile(lat, lon, DEM_ZOOM);
    let elev;
    try { elev = await fetchTerrainTile(tile.x, tile.y, DEM_ZOOM); } catch(e) { return null; }

    const b = tileBoundsLL(tile.x, tile.y, DEM_ZOOM);
    const px = Math.floor(((lon - b.west) / (b.east - b.west)) * 256);
    const py = Math.floor(((b.north - lat) / (b.north - b.south)) * 256);
    if (px < 2 || px > 253 || py < 2 || py > 253) return null;

    const latM = 111320, lonM = 111320 * Math.cos(lat * Math.PI / 180);
    const csM = ((b.north - b.south) / 256 * latM + (b.east - b.west) / 256 * lonM) / 2;

    const i = py * 256 + px;
    const dzdx = ((elev[(py-1)*256+(px+1)] + 2*elev[i+1] + elev[(py+1)*256+(px+1)]) -
                  (elev[(py-1)*256+(px-1)] + 2*elev[i-1] + elev[(py+1)*256+(px-1)])) / (8*csM);
    const dzdy = ((elev[(py+1)*256+(px-1)] + 2*elev[(py+1)*256+px] + elev[(py+1)*256+(px+1)]) -
                  (elev[(py-1)*256+(px-1)] + 2*elev[(py-1)*256+px] + elev[(py-1)*256+(px+1)])) / (8*csM);

    const slope = Math.atan(Math.sqrt(dzdx*dzdx + dzdy*dzdy)) * 180 / Math.PI;
    let asp = Math.atan2(dzdy, -dzdx) * 180 / Math.PI;
    if (asp < 0) asp += 360;

    const elevFt = Math.round(elev[i] * 3.28084);
    return { elevation: elevFt, aspect: aspectDegToDir(asp), aspectDeg: asp, slope: Math.round(slope * 10) / 10 };
}

// Remove a probe zone by id: cleans up marker, cache, aspect grid, and rebuilds wedges
function removeProbeZone(probeId) {
    const idx = probeZones.findIndex(p => p.id === probeId);
    if (idx === -1) return;
    probeZones.splice(idx, 1);
    delete cache[probeId];
    delete zoneAspectGrids[probeId];
    delete _terrainGeomCache[probeId];
    if (markers[probeId]) { markers[probeId].remove(); delete markers[probeId]; }
    delete markerEls[probeId];
}

// Remove ALL probe zones (called when selecting a named zone or creating a new probe)
function clearAllProbes() {
    // Work on a copy since removeProbeZone mutates the array
    const ids = probeZones.map(p => p.id);
    ids.forEach(id => removeProbeZone(id));
    if (map && map.getSource('wedges')) {
        map.getSource('wedges').setData(buildWedgeGeoJSON(timeOverride));
    }
}

// Main click handler — creates a full wedge circle at the clicked point
async function handleTerrainProbe(e) {
    const { lng, lat } = e.lngLat;
    const lon = lng;
    if (!isInVermont(lat, lon)) return;

    // Clear any previous probes — only one at a time
    clearAllProbes();

    // Create probe zone id
    probeCounter++;
    const probeId = `probe_${probeCounter}`;
    const probeName = `Probe #${probeCounter}`;

    // Immediately add a pulsing marker
    const el = document.createElement('div');
    el.className = 'zone-dot';
    el.style.cssText = 'width:14px;height:14px;background:#FFD54F;animation:pulse 1s infinite;';
    el.title = probeName + ' (loading...)';
    el.addEventListener('click', () => selectZone(probeId));
    const m = new maplibregl.Marker({ element: el, anchor: 'center' })
        .setLngLat([lon, lat]).addTo(map);
    markers[probeId] = m;
    markerEls[probeId] = el;

    // Show loading popup
    const popup = new maplibregl.Popup({ closeOnClick: true, maxWidth: '280px', offset: 12 })
        .setLngLat([lon, lat])
        .setHTML('<div style="padding:8px;font-size:.7rem;color:#8eaabd">Analyzing terrain & fetching weather...</div>')
        .addTo(map);

    try {
        // Fetch DEM point info + terrain grid + weather in parallel
        const [demInfo, cells, wxRaw] = await Promise.all([
            probeDEM(lat, lon),
            computeAspectGrid(lat, lon, WEDGE_RADIUS),
            fetchOpenMeteo(lat, lon)
        ]);

        const nd = normalizeOpenMeteo(wxRaw);
        const elevFt = demInfo?.elevation ?? 0;
        const primaryAspect = demInfo?.aspect ?? 'N';

        // Create the synthetic zone object
        const synZone = {
            id: probeId, name: probeName,
            lat, lon, elev: elevFt,
            aspect: primaryAspect, canopy: 'open', type: 'bc',
            isProbe: true,
            desc: `Probed point at ${lat.toFixed(4)}°N, ${Math.abs(lon).toFixed(4)}°W · ${elevFt.toLocaleString()}' · ${primaryAspect}-facing · ${demInfo?.slope ?? '?'}° pitch`
        };

        // Register in probe system
        probeZones.push(synZone);

        // Cache weather + classification (same format as regular zones)
        const quality = classify(nd, synZone);
        const aspectQualities = {};
        ASPECTS.forEach(asp => {
            aspectQualities[asp] = classify(nd, { ...synZone, aspect: asp });
        });
        cache[probeId] = { nd, quality, aspectQualities };

        // Store terrain grid
        zoneAspectGrids[probeId] = { cells };

        // Update marker appearance
        el.style.background = quality?.color ?? '#546E7A';
        el.style.animation = 'none';
        el.title = probeName;

        // Rebuild wedge layer to include the new probe zone
        if (map && map.getSource('wedges')) {
            map.getSource('wedges').setData(buildWedgeGeoJSON(timeOverride));
        }

        // Update popup with summary + remove button
        const fahr = c => (c * 9/5 + 32).toFixed(0);
        const tempF = nd.currentTempC != null ? `${fahr(nd.currentTempC)}°F` : '—';
        const s24 = nd.snow24h_cm ? `${(nd.snow24h_cm / 2.54).toFixed(1)}"` : '0"';
        const depthIn = nd.snowDepthM ? `${(nd.snowDepthM * 39.37).toFixed(0)}"` : '0"';

        // Mini aspect rose
        const aspRoseHTML = ASPECTS.map(a => {
            const aq = aspectQualities[a];
            const c = aq?.color ?? '#546E7A';
            const isCur = a === primaryAspect;
            return `<span style="display:inline-block;width:${isCur?14:10}px;height:${isCur?14:10}px;border-radius:50%;background:${c};border:${isCur?'2px solid #fff':'1px solid rgba(255,255,255,.3)'};margin:1px;vertical-align:middle" title="${a}: ${aq?.quality ?? '?'}"></span>`;
        }).join('');

        popup.setHTML(`
            <div style="min-width:190px;max-width:270px;line-height:1.4">
                <div style="font-size:.85rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px">
                    <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${quality?.color ?? '#546E7A'}"></span>
                    ${quality?.emoji ?? ''} ${quality?.quality ?? 'Unknown'}
                </div>
                <div style="font-size:.6rem;color:#8eaabd;margin-bottom:5px">
                    ${lat.toFixed(4)}°N, ${Math.abs(lon).toFixed(4)}°W
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;font-size:.7rem">
                    <span style="color:#8eaabd">Elev</span><span>${elevFt.toLocaleString()}'</span>
                    <span style="color:#8eaabd">Aspect</span><span>${primaryAspect} · ${demInfo?.slope ?? '?'}° pitch</span>
                    <span style="color:#8eaabd">Temp</span><span>${tempF}</span>
                    <span style="color:#8eaabd">24h Snow</span><span>${s24}</span>
                    <span style="color:#8eaabd">Depth</span><span>${depthIn}</span>
                </div>
                <div style="margin-top:5px;text-align:center">${aspRoseHTML}</div>
                ${quality?.reason ? `<div style="margin-top:4px;font-size:.58rem;color:#8eaabd;border-top:1px solid rgba(255,255,255,.1);padding-top:3px">${quality.reason}</div>` : ''}
                <div style="margin-top:6px;display:flex;gap:6px;justify-content:center">
                    <button onclick="selectZone('${probeId}')" style="background:#1a3a5c;color:#b0d4f1;border:1px solid #2a5a8c;border-radius:4px;padding:2px 10px;font-size:.65rem;cursor:pointer">View Details</button>
                    <button onclick="removeProbeZone('${probeId}')" style="background:#3a1a1a;color:#ef9a9a;border:1px solid #5a2a2a;border-radius:4px;padding:2px 10px;font-size:.65rem;cursor:pointer">Remove</button>
                </div>
            </div>`);

    } catch(err) {
        console.warn('Probe failed:', err.message);
        // Clean up on failure
        if (markers[probeId]) { markers[probeId].remove(); delete markers[probeId]; }
        delete markerEls[probeId];
        popup.setHTML(`<div style="padding:8px;font-size:.7rem;color:#ef5350">Analysis failed: ${err.message}</div>`);
    }
}

// ════════════════════════════════════════════════════════════
// RESORT SNOW QUALITY CLASSIFICATION
//
// Resort model differs from backcountry in key ways:
//   • No Variable/Thin — snowmaking ensures minimum coverage
//   • No Wind Slab — grooming eliminates slab hazards on-piste
//   • Lower powder threshold (4" vs 8") — groomers amplify fresh snow impact
//   • Prime Grooming category — cold overnights create perfect corduroy
//   • Icy/Hard Pack replaces Crusty/Ice — still skiable with grooming
// ════════════════════════════════════════════════════════════
function classifyResort(nd, zone) {
    const {currentTempC:rawCurT, maxTempC_72h:rawMaxT, minTempC_72h:rawMinT,
           snow24h_cm:s24, snow72h_cm:s72, snow7d_cm:s7,
           rain24h_mm:r24, rain72h_mm:r72,
           snowfall_season_cm:seasonSnow=0,
           minTempTomorrow:rawMinTomorrow=null, maxTempTomorrow:rawMaxTomorrow=null} = nd;

    const LAPSE_F = 1.5, ELEV_BASE = 1500;
    const elevCorrC = (zone.elev ?? 0) > ELEV_BASE
        ? -((zone.elev - ELEV_BASE) / 1000) * (LAPSE_F / 1.8) : 0;
    const curT = rawCurT + elevCorrC;
    const maxT = rawMaxT + elevCorrC;
    const minT = rawMinT + elevCorrC;

    // Tomorrow's temps (elevation-corrected) — used for corn-tomorrow prediction
    const tomorrowMin = rawMinTomorrow != null ? rawMinTomorrow + elevCorrC : null;
    const tomorrowMax = rawMaxTomorrow != null ? rawMaxTomorrow + elevCorrC : null;

    const fahr = c => (c*9/5+32).toFixed(0);
    const inch = cm => (cm/2.54).toFixed(1);
    const month = new Date().getMonth();
    const hour  = new Date().getHours();
    const isCornSeason = month >= 2 && month <= 4;

    const solarMap = {N:.05, NE:.20, NW:.12, E:.55, W:.45, SE:.80, SW:.72, S:.95};
    const springMult  = isCornSeason ? 1.5 : (month === 1 ? 1.15 : 1.0);
    const isWinter    = month <= 1 || month >= 10;
    const canopyMult  = ({conifer:0.45, mixed:isWinter?0.65:0.50, deciduous:isWinter?0.85:0.45, open:1.0})[zone.canopy??'open'];
    const rawSolar    = (solarMap[zone.aspect] ?? 0.5) * springMult;
    const solar       = rawSolar * canopyMult;

    const rainThenFreeze = r72 > 3 && curT < -2;
    // Use RAW (pre-lapse) temps for melt-freeze checks: on open resort terrain solar
    // radiation dominates, and the station reading is a better proxy for surface conditions
    // than the aggressively lapse-corrected summit air temp.
    const freezeThaw     = rawMaxT > 0 && rawMinT < -4;
    const solarSoftening = rawSolar > 0.55 && curT > -4;
    const activeMelt     = curT > 1;
    const rainOnSnow     = r24 > 5;
    const cornCycle      = rawMaxT >= 0 && rawMaxT <= 8 && rawMinT >= -16 && rawMinT <= -2;
    const cornAspects    = ['S','SE','SW','E','W'];
    const cornEligible   = isCornSeason || (month === 1 && cornAspects.includes(zone.aspect));
    // Tomorrow sets up corn if it refreezes tonight and thaws again tomorrow
    const cornTomorrow   = cornEligible && tomorrowMin != null && tomorrowMin < -2
                           && tomorrowMax != null && tomorrowMax >= 0;

    // ① POWDER DAY — 4"+ fresh snow, cold temps (lower threshold than BC)
    if (s24 > 10 && curT < -2 && r72 < 1)
        return {quality:'Powder Day', rating:10, color:'#1565C0', emoji:'❄️', alert:'excellent',
            reason:`${inch(s24)}" fresh overnight at ${fahr(curT)}°F. Hit the groomers at first chair, then find the stashes.`};

    // ② RAIN ON SNOW
    if (rainOnSnow && !rainThenFreeze)
        return {quality:'Wet/Slushy', rating:2, color:'#C62828', emoji:'💦', alert:'warning',
            reason:`${r24.toFixed(1)}mm rain soaking the snowpack. Grabby and wet — wait for a freeze.`};

    // ③ ICY/HARD PACK — rain refroze or hard freeze-thaw
    if (rainThenFreeze || (freezeThaw && s24 < 5 && solar > 0.25))
        return {quality:'Icy/Hard Pack', rating:4, color:'#78909C', emoji:'🧊', alert:'warning',
            reason: rainThenFreeze
                ? `${r72.toFixed(1)}mm rain refroze at ${fahr(curT)}°F. Groomed runs hard and fast; off-piste is bulletproof.`
                : `Melt-refreeze (H:${fahr(maxT)}°F / L:${fahr(minT)}°F). Fast firm morning groomers — ski early before it softens.`};

    // ④ SPRING CORN — use rawSolar (pre-canopy) since resort trails are cut open;
    // tree cover on the slope doesn't block sun the way dense backcountry forest does.
    if (cornEligible && cornCycle && rawSolar > 0.25 && hour < 15) {
        const window = hour < 10 ? 'Still firm — wait for mid-morning softening.' :
                       hour < 14 ? '🎯 Prime corn window (10am–2pm)!' :
                                   'Past prime — getting wet. Wrap it up.';
        return {quality:'Spring Corn', rating:8, color:'#F9A825', emoji:'🌽', alert:'good',
            reason:`Melt-freeze on ${zone.aspect}-facing terrain (H:${fahr(rawMaxT)}°F / L:${fahr(rawMinT)}°F). ${window}`};
    }

    // ④b POST-CORN REFREEZE — evening after a corn day: surface is tracked and locking up,
    // not groomed corduroy. The melt-freeze cycle happened; now it's refreezing on skied-off snow.
    if (cornEligible && cornCycle && hour >= 15 && curT < -1) {
        const tomorrowNote = cornTomorrow
            ? ` Tonight refreezes to ${fahr(tomorrowMin)}°F — tomorrow repeats the cycle.`
            : ' Check conditions tomorrow morning.';
        return {quality:'Icy/Hard Pack', rating:4, color:'#78909C', emoji:'🧊', alert:'warning',
            reason:`Post-corn refreeze at ${fahr(curT)}°F. Surface worked over and locking up — not groomed.${tomorrowNote}`};
    }

    // ⑤ WET / SOLAR-SOFTENED
    if (activeMelt || solarSoftening)
        return {quality:'Wet/Slushy', rating:3, color:'#C62828', emoji:'💦', alert:'warning',
            reason: activeMelt
                ? `${fahr(curT)}°F — wet, heavy snow. Ski the morning, skip the afternoon.`
                : `Solar loading on ${zone.aspect}-facing terrain (${fahr(curT)}°F). Groomers soften quickly in direct sun.`};

    // ⑥ PRIME GROOMING — very cold overnight, no corn cycle today, textbook corduroy.
    // Explicitly excluded when it was a corn day (surface is tracked/icy, not freshly groomed).
    if (curT < -4 && minT < -8 && s24 < 10 && !cornCycle)
        return {quality:'Prime Grooming', rating:8, color:'#00897B', emoji:'⭐', alert:'good',
            reason:`${fahr(minT)}°F overnight locked in perfect corduroy. Cold, fast, consistent — ideal carving conditions.`};

    // ⑦ GOOD CONDITIONS — cold settled snow
    if (curT < 0 && (s7 > 4 || seasonSnow > 15))
        return {quality:'Good Conditions', rating:6, color:'#1976D2', emoji:'🎿', alert:'good',
            reason:`${fahr(curT)}°F keeping snow firm. Groomed runs consistent. ${inch(s7)}" in the past week.`};

    // ⑧ VARIABLE — check resort report
    return {quality:'Variable', rating:3, color:'#37474F', emoji:'❓', alert:'fair',
        reason:`Mixed conditions at ${fahr(curT)}°F. Check the resort's morning grooming report.`};
}
